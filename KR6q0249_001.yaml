body:
  text: 雪竇明覺禪師拈古佛果圜悟禪師擊節第一則德山示眾舉德山示眾云今夜不答話言猶在耳問話者三十棒打云喫棒了也時有僧出禮拜山便打忘前失後漢僧云某甲話也未問却較些子山云你是甚處人換却眼睛僧云新羅人却換德山眼睛山云未踏船舷好打三十棒大小德山作這般去就法眼拈云大小德山話作兩橛漆桶夜生光圓明拈云大小德山龍頭蛇尾烏龜鑽破壁雪竇拈云二老宿雖善裁長補短舍重從輕錯下名言要見德山亦未可還曾夢見德山麼何故德山大似握閫外威權有當斷不斷不招其亂底劒險諸人要識新羅僧麼莫是闍黎只是撞著露柱的瞎漢自領出去師云古人舉一機一境皆明此事且世尊未舉花已前是箇什麼道理後來所以買帽相頭相席打令如今只管記憶千端萬端打葛藤有什麼了期多知多解轉生煩惱古人或拈古頌古一則因緣須是出得他古人意方可拈掇只如德山本是西蜀講金剛經座主聞南方禪宗大興他云南方魔子如此盛遂罷講散徒擎將疏鈔欲破禪宗及至龍潭言下大悟後住德山三日一回搜堂凡見文字即時燒却十二時中打風打雨後來出巖頭雪峰如龍似虎相似到他打葛藤時自有奇特處一日示眾道汝但無事於心於心無事則虗而靈寂而妙又道捉空追響勞汝心神夢覺覺非覺亦非覺一日巖頭來參纔展坐具德山以拄杖挑向堦下巖頭下堦收得便去參堂來日却上問訊侍立次山云你什麼處學得這箇虗頭來巖頭云某甲不敢自謾山云你已後向老僧頭上屙去在且道他見箇什麼却不打他豈不是有奇特處方可如此巖頭一日來參脚纔跨門便問是凡是聖德山便喝巖頭便禮拜且道他父子見箇什麼便如此奇特五祖先師道他既是開箇鋪席為什麼却不答話且道德山意在什麼處這僧也好奇特跳出眾來便禮拜德山便打一似鷹挐燕似鶻捉鳩只如法眼拈道大小德山話作兩橛可謂據款結案圓明拈道大小德山龍頭蛇尾也是看孔著楔如今作麼生會這公案若做兩橛會且得沒交涉便作龍頭蛇尾會且得沒交涉既不恁麼會畢竟作麼生且道二老宿為什麼却如此拈諸人試著眼看古人道獅子咬人狂狗逐塊如今作麼生見得德山去所以拈古十箇拈做十般要須出他古人意方喚作拈古只如傅大士道夜夜抱佛眠朝朝還共起要知佛去處只這語聲是看他玄沙拈道大小傅大士只認箇昭昭靈靈又靈雲見桃花便悟云自從一見桃花後直至如今更不疑玄沙云諦當甚諦當敢保老兄未徹在且道他意在什麼處雪竇一似古人先拈他兩人語道此二老宿雖善裁長補短捨重從輕且道甚麼處是裁長補短處什麼處是捨重從輕處此兩箇分明點檢德山雪竇拈來為甚麼却道要見德山亦未可雪竇後面也只要見德山這些子也難後來人便邪解道法眼圓明只是裁長補短捨重從輕只管作露布有什麼交涉雪竇拈道德山似箇什麼如閫外將軍相似有威有權為他有箇劒當斷不斷時也不招其亂雪竇如此拈也有錯會者不少雪竇前面拈了為什麼又拈道諸人要識新羅僧麼只是撞著露柱底瞎漢諸人且道什麼處是這僧瞎處人多情解道等他德山道你是什麼處人當時便以坐具劈面摵癡人若如此德山便放你也且道畢竟什麼處是這僧瞎處師便打第二則雪峯普請舉雪峯一日普請自負一束藤勞而無功路逢一僧峯便拋下力盡神疲僧方擬取峯便踏倒下坡不走快便難逢歸舉似長生乃云我今日踏這僧快少賣弄生云和尚替這僧入涅槃堂始得閙市裏要一箇半箇峯便休去可惜放過雪竇拈云長生大似東家人死西家助哀也好與一踏闍黎也須急着眼始得師云只這雪竇合喫多少如今且放過一著雪峯為一千五百人善知識當時日日普請運水搬柴豈似如今兄弟端坐飽食不知慚愧不見雲門問僧甚麼處來僧云負柴來門云閑口且道他雲門意又作麼生諸人試體究看只如雪峯普請處踏倒這僧歸舉似長生長生是箇活潑潑地漢便道和尚也須替這僧入涅槃堂始得只這雪峯老漢也好當時便休去到這裏作麼生湊泊也須是三根椽下五尺單前靜坐究取始得看雪竇老婆拈似與諸人到這裏見得去自然打著南邊動北邊纔拈起便眼卓朔地雪竇拈掇他這因緣人多邪解別生知見義路只管解將去殊不知雪竇意元不如此且道他意在什麼處也好與一踏且莫錯會第三則百丈拂子舉百丈再參馬祖不唧漢侍立次祖以目視禪牀角頭拂子兩箇一場敗闕丈云即此用離此用情知泥裏洗土塊祖云你他後開兩片皮將何為人也要知你落處丈取拂子竪起蝦跳不出斗祖云即此用離此用驗人端的處下口即知音丈挂拂子於舊處果然只在舊窠窟祖便喝輪王髻中珠不可輕分付百丈直得三日耳聾雖然如是若不酬價爭辨真偽雪竇拈云奇怪諸禪德也不免遭他點檢如今列其派者甚多莫欺我兒孫究其源者極少雪竇從來點𮌎總道百丈於喝下大悟還端的也無自是他把不住然刀刁相似魚魯參差曹溪波浪如相似無限平人被陸沈若是明眼漢瞞他一點不得明眼漢正好瞞只如馬祖道你他後開兩片皮將何為人人將財試金將火試百丈竪起拂子機境未忘為復如蟲禦木正是為復啐同時夢見諸人要會三日耳聾麼雪竇還會麼大冶精金應無變色錯下名言不是今日師云百丈和尚侍奉馬祖二十餘年最得馬祖提誨此一則因緣叢林謂之再參馬祖話人多舉得不同然宗師家只拈他著力處古時尊宿纔見僧來便舉起拂子問佛法或問祖意西來意多舉起拂子所謂如獅子教兒迷蹤訣纔方跳擲又翻身了也須會他宗師家手脚始得如此奇絕看他師資相見如印印空更無瑕玷如印印泥誰辨得他字義到這裏道吾舞笏同人會石鞏張弓作者知如印印水涅槃心易曉差別智難明只如溈山問仰山馬祖出八十四員善知識幾人得大機幾人得大用仰山云百丈得大機黃蘗得大用自餘皆是唱道之師看他馬祖一喝百丈直得三日耳聾且道此一喝意作麼生不見適來道輪王髻中珠不可輕分付古人那裏肯獨自用來且打葛藤引相似一二不見丹霞訪龐居士問靈照云居士在否靈照斂手而立又問居士在否靈照𢹂籃便行僧又問靈雲佛未出世時如何雲竪起拂子又問出世後如何雲亦竪起拂子又問雪峯佛未出世時如何峯竪起拂子出世後如何峯拋下拂子僧禮拜峯便打到這裏棒頭有眼明如日要識真金火裏看後來黃蘗纔見百丈丈問巍巍堂堂從甚麼處來蘗云巍巍堂堂從嶺南來丈云巍巍堂堂來為何事蘗云巍巍堂堂不為別事一日黃蘗謂百丈云暫別左右欲禮拜馬祖去丈云馬祖已遷化了也蘗云未審馬祖在日有何言句丈遂舉再參因緣黃蘗不覺吐舌但如此參到至玄至妙處隨分舉一毫便蓋天蓋地便能拈一莖草作丈六金身用將丈六金身作一莖草用天下人總不奈你何古人道三日耳聾由自可三聖瞎驢愁殺人且道作麼生會他恁麼道汾陽道悟去便休說甚麼三日耳聾石門聰云若不是三日耳聾爭承當得這一喝汾陽後來道我當時恁麼道猶較石門半月程雪竇拈云奇怪諸禪德如今列其派者甚多究其源者極少雪竇拈汾陽石門總道百丈於喝下大悟似則似爭奈魚魯參差若是明眼漢瞞他一點不得只如馬祖道你已後開兩片皮將何為人百丈豎起拂子為復是如蟲禦木為復是啐同時殊不知雪竇一口吞盡亦乃盡神通妙用拈出似與人既拈出他且畢竟如何出他一隻眼你等諸人要見三日耳聾麼大冶精金應無變色這語句沉却多少人了也雪竇要出氣露一機一境千古萬古撲不破諸人且莫錯會好第四則崇壽指凳舉崇壽指凳子只是凳子云識得凳子周匝有餘十方世界外更有世界在雲門云識得凳子天地懸殊減得一半雪竇拈云澤廣藏山理能伏豹任大也須從地起更高爭奈有天何師云無味之談塞斷人口且道古人為甚麼至理之言却不舉却指凳子諸人且道有什麼奇特處雲門道天地懸殊懷和尚却道楠榆木做秀圓通道四脚著地和崇壽一坑埋却山僧這裏不要凳子只要田地上淨潔所以雪竇拈云澤廣藏山理能伏豹雪竇道如此未審是明他語點他話是襃是貶凡是一拈一提若是有工夫自然蓋天蓋地第五則永嘉遶錫舉永嘉大師到六祖遶禪牀三匝振錫一下卓然而立魚行水濁祖云夫沙門具三千威儀八萬細行大方之家善收善放大德從何方而來生大我慢便不屈人雪竇便喝乃云當時若下得這一喝免得龍頭蛇尾賊過後張弓又再舉遶禪牀三匝振錫一下卓然而立鳥飛毛落代六祖云未到曹溪與你三十棒了也也是無風起浪永嘉大師本是講維摩經座主因講維摩經自悟說得話驚人因六祖會中策禪師游三吳預座隨喜見他講得不同尋常座主見解因講散遂詰其心地所發之言並同諸祖䇿曰仁者悟心師是誰耶受誰印可覺曰我聽方等維摩經論並無師承於維摩經悟佛心宗無人證據䇿曰仁者威音王已前則得威音王已後無師自悟盡是天然外道覺曰願仁者為我印證䇿曰我乃言輕有第六祖師在曹溪四方雲集並是受法之人覺率䇿同至曹溪印可永嘉既至曹溪見六祖坐次持錫遶繩牀三帀振錫一下卓然而立六祖云夫沙門具三千威儀八萬細行大德從何方來生大我慢永嘉也好便道生死事大無常迅速六祖本要拋箇鈎釣永嘉却倒被永嘉釣將去兩家只管打葛藤一對一問千古萬古悉皆如此末後六祖道如是如是永嘉便行祖云少留一宿故號為一宿覺名玄覺號真覺雪竇拈古有大手脚更不引問答直引他初見六祖語雪竇拈弄永嘉道生死事大無常迅速且得沒交涉雪竇教永嘉下喝免見後人指注且道明什麼邊事這一喝似箇什麼似置一寶珠向面前若是有錢人便買將去當時屬你也宗師家拈古有出羣處却再舉六祖道等遶繩牀三帀振錫一下卓然而立好向他道未到曹溪已與你三十棒了也雪竇前頭與永嘉出一隻眼這裏與六祖出一隻眼且道雪竇意作麼生第六則仰山指雪舉仰山指雪獅子云還有過此色者麼瞎雲門云當時便與推倒不奈船何打破戽斗雪竇拈云只解推倒不能扶起將錯就錯師云仰山侍奉溈山前後二十餘年乃去行化一日歸省侍溈山山問子稱善知識爭辨得諸方來者知有不知有有師承無師承是義學是玄學試說看仰山云有箇驗處但見諸方僧來竪起拂子問伊諸方還說這箇不說這箇這箇且置諸方老宿意作麼生溈山歎曰此是宗門中牙爪仰山有如此為人手段所以一日指雪獅子問云還有過得此色者麼且道他意在什麼處莫是明一色邊事麼且得沒交涉既不明一色邊事又明箇什麼所以道鷺鷥立雪非同色明月蘆花不似他巴陵鑒和尚僧問如何是提婆宗鑒云銀椀裏盛雪雪竇拈拄杖示眾云把斷世界不漏絲毫還搆得也無所以雲門道直得乾坤大地無絲毫過患只是轉物不見一色猶為半提直得如此更須知有全提時節諸上座翠峯若是全提盡大地人並須結舌放一線道轉見不堪以拄杖一時打散雪竇悟到這般田地方可為人老僧道瞎諸人作麼生會雲門應時應節但與推倒用拈仰山意又被雪竇拈道他只解推倒不解扶起且道雪竇意在什麼處第七則香嚴垂語舉香嚴垂語云作什麼如人上樹還覺滿口含霜麼口銜樹枝撲落也手不攀枝便有恁麼人脚不踏枝奇怪樹下有人問西來意阿誰不對則違他所問莫道若對又喪身失命伏惟尚享正當恁麼時作麼生即是香嚴又撲落了也時有虎頭上座出云上樹即不問未上樹請和尚道東家人死西家助哀香嚴呵呵大笑也是落他綣繢了也雪竇拈云樹上道即易樹下道即難旁出一枝老僧上樹也致一問來險諸方老漢得箇見處直是千般萬計提起為人更不囊藏被蓋立箇喻令人易曉却倒成難曉何故為慈悲深厚令人轉生情解若是慈悲淺却較些子只如香嚴垂語道若論此事如人上樹口銜樹枝這箇香嚴老婆心切只這問你若纔生樹上樹下對與不對處轉生義路墮在常情卒難透得若是頂門上具眼的終不向對與不對處作解會未舉已前先知落處後學之流須是透過這關捩子始可出得身吐得氣若透不過坐在這裏名為死漢有什麼用處你看得底人逈別便知他落處香嚴纔垂此語便有虎頭上座出云上樹即不問未上樹請和尚道香嚴呵呵大笑你道香嚴笑箇什麼若知落處說什麼上與不上若不知落處也須退步看始得若是作者當機便見若擬議之間覿面蹉過或不落二邊對也不是不對也不是作麼生却得見古人意去到這裏若是具通方底手脚說甚麼樹上樹下對與不對如今山僧在這裏是上樹是未上樹是對是不對雪竇拈香嚴與虎頭相見處却教人致一問來還有麼樹上道即易樹下道即難末後又道老僧上樹也致將一問來這些子如馬前相撲眨眼便輸雪竇於節角譊訛處拈出令人見羅籠不肯住呼喚不回頭底漢纔聞人舉便知全機大用善能拈提看雪竇老漢也不妨奇特第八則魯祖喫飯舉僧問魯祖這面壁漢鈍滯殺人如何是不言言道什麼祖云你口在什麼處險僧云某甲無口撞着祖云將什麼喫飯第二杓惡水來也僧無語可惜許將成九仞之山不進一簣之土雪竇拈云好劈脊便棒也是遲了也這般漢開口了合不得合口了開不得雪竇却須替這僧喫棒始得師云魯祖參馬大師住池州魯祖山凡見僧來便面壁直下省要只是難搆南泉聞云我尋常向人道向佛未出世時承當尚不得一箇半箇他恁麼驢來去一日南泉到來撫師背一下師云誰泉云普願師云如何泉云也是尋常祖云得恁麼多口僧問如何是雙林樹祖云有相身中無相身僧云如何是有相身中無相身祖云金香爐下鐵崑崙又問如何是學人著力處祖云春來草自青僧云如何是不著力處祖云山崩石頭落平川燒火行魯祖如此為人諸公作麼生會試參詳看所以古人道欲得親切莫將問來問這僧致箇問端魯祖便如此答這僧如此進一轉語不妨奇特爭奈魯祖是作家爐韛有大手段底也出他不得後來雪竇傍不肯便云好劈脊便打大眾好去這裏代這僧一轉語免見雪竇恁麼道若是具眼腦漢終不向言語裏作活計第九則雪峰古㵎舉僧問雪峯古㵎寒泉時如何戴得將來峯云瞪目不見底老婆心切僧云飲者如何正是降尊就𢍉峯云不從口入從什麼處入僧舉似趙州也須是這僧始得州云不可從鼻孔裏入也須是這老漢始得僧却問趙州古㵎寒泉時如何放過即不可州云苦不妨難為咬嚼僧云飲者如何更不再活州云死灼然雪峯聞舉云趙州古佛從此不答話也是什麼心行雪竇拈云眾中總道雪峯不出這僧問頭所以趙州不肯多少人作者語話如斯話會深屈古人灼然雪竇即不然看雪竇有甚麼長處斬釘截鐵本分宗師分作兩邊就下平高難為作者雪竇也出趙州綣繢不得師云雪竇拈來也是好心也是不好心何故一手擡一手搦僧問雪峯古㵎寒泉時如何峯云瞪目不見底僧云飲者如何峯云不從口入後人只管用作不答話會作恁麼去就驢年夢見汾陽謂之借事明己古㵎寒泉時如何瞪目不見底此明他脚跟下事雪峯是一千五百人善知識依前用他問處答道瞪目不見底為他問道脚跟下事似古㵎寒泉相似這老漢不妨親切古人道問在答處答在問處不見僧問雲門佛法如水中月是否門云清波無透路且道是同是別如今人只隨語生解殊不知趙州與雪峯相見州云不可從鼻孔裏入雪峯云趙州古佛從此不答話已是與他相見且道這裏意是如何須是打破面前漆桶始可入作後人不善來風走向趙州語下作活計到這裏若是通方漢必知此二尊宿落處雪峯云趙州古佛從此不答話此一句語如金如玉難酬其價雪峯雖答者僧話終不去語句裏作繫驢橛後人多少錯會妄去中間穿鑿殊不知本宗猷此事若只在言句上便不深屈古人所謂玉女已歸霄漢去獃郎猶在火爐邊雪竇道眾中總道雪峯答他話便成就下平高難為作者又是錯會喫雪竇毒藥了也此意與法眼話作兩橛一般只為他一手擡一手搦只如趙州勘婆子且道是勘破不勘破且道雪峯是答他話不答他話真如喆拈趙州勘婆子話道天下衲僧只知問路老婆要且不知脚下泥深若非趙州老人爭顯功高汗馬只如雪竇道如斯話會深屈古人且道是屈是不屈懷和尚道作麼生會不答話底道理讚歎趙州即不無還知趙州一片玉瑕生麼若點檢得出相如不誑於秦王雪竇分明拈了也而今人却不去見趙州雪峯却走去咬雪竇語句去語脈上走不知他雪竇一手擡一手搦且道阿誰是斬釘截鐵本分宗師阿誰是就下平高難為作者到這老直饒辨得去也只是語脈上走第十則西堂爛却舉僧問西堂有問有答賓主歷然無問無答時如何師低頭作應聲西堂云怕爛却那也是草裏漢又問長慶有問有答賓主歷然無問無答時如何也不得放過慶云相逢盡道休官去林下何曾見一人也善東瞥西瞥雪竇拈云何不與本分草料且道作麼生是本分草料師云不墮心機意想如何得平穩去古人道欲得親切莫將問來問何故問即似偷人物了更云我去彼中偷得甚物來乃在這裏賊贓已露這僧致箇問端一似如此却將去問西堂和尚云有問有答賓主歷然無問無答時如何堂云怕爛却那古人太煞慈悲有時孤峯頂上垂手有時荒草裏橫身他道怕爛却那奇特不妨親切這僧却更去問長慶慶云相逢盡道休官去林下何曾見一人這僧分明去問是有問有答了更說什麼如何若何惹得長慶恁麼道又且得不辜負他來問處雪竇拈云何不與本分草料也是騎賊馬赶賊第十一則欽山竪拳舉欽山一日上堂竪起拳頭又開云開即為掌五指參差打入葛藤窩窟去也復握拳云如今為拳必無高下也是靈龜曳尾還有商量也無合取狗口一僧出眾竪起拳頭弄泥團漢有甚麼限山云你只是箇無開合漢也好與三十棒雪竇拈云雪竇即不然也隨後打入葛藤去也乃竪拳云握則為拳有高有下捩轉鼻孔復開云開則成掌無黨無偏爭知轉却了也且道放開為人好把定為人好總不好開也造車握也合轍已在鬼窟裏作活計了也若謂閉門造車出門合轍也是闍黎見解我也知你鬼窟裏作活計打云自領出也師云看他古人如此老婆心切千方百計舉揚顯示箇一段大事令人易見中間也有用作示眾用作借事明物也有悟去者雪竇因風吹火用力不多乃竪起拳頭云握則為拳有高有下復開云開則成掌無黨無偏且道放開為人好把定為人好開也造車握也合轍若謂閉門造車出門合轍我也知你向鬼窟裏作活計古人為此事如是故故如此且道是如何古人同條生則是一為什麼却如此不同諸人無事試翻覆參詳看是什麼道理若是箇漢一便知其或擬議便隔千山萬水了沒交涉也第十二則睦州苕菷舉僧問睦州高揖釋迦不拜彌勒時如何有恁麼茆廣漢州云昨日有人問赶出院了也已是第二頭僧云和尚怕某甲不實怕死禪和如麻如粟州云拄杖不在苕菷柄聊與三十拳頭也得便打雪竇拈云睦州只有受璧之心且無割城之意旁觀者哂師云且道這僧過在甚麼處豈不見石頭問讓和尚不求諸聖不重己靈時如何讓云子問太高生何不向下問將來頭云寧可永劫沉輪不求諸聖解脫乂僧問洞山文殊普賢來參時如何山云趁向水牯牛裏隊去僧云和尚入地獄如箭射山云全賴子力這僧不是尋常底禪和却云怕某甲不實是則是直饒浪擊千尋爭奈龍王不顧睦州道拄杖不在苕菷柄聊與三十且道是壓良為賤莫是倚勢欺人切忌錯會好削去是非得失情解計較令淨躶躶赤洒洒自然正見現前得大自在古人道合恁麼時早是錯了也雪竇傍相一拶甚好拈即許你拈會即不許你會何故睦州只有受璧之心且無割城之意往往真箇道睦州只有受璧之心正落在雪竇綣繢窠窟裏戰國時秦強趙弱而趙有連城之璧秦王聞之許以十五城易之趙乃遣藺相如送璧至秦秦王但受其璧竟無割城之意相如乃以計奪還於趙也諸人且道什麼處是睦州只有受璧之心處且甚處是無割城之意處也須各人著些精彩始得第十三則棗樹漢國舉棗樹問僧近離甚處常程僧云漢國也是樹云漢國天子還重佛法也無頭角生也僧云苦哉賴值問著某甲觸着便作屎臭氣問著別人則禍生似則似只恐龍頭蛇尾樹云作什麼也要問過僧云人尚不見有何佛法可重已是禍門樹云闍黎受戒來多少時可惜許拖泥帶水僧云二十夏忘前失後樹云大好不見有人便打郎當葛藤愁殺人雪竇拈云這僧棒即喫要且去不再來旁不甘棗樹令雖行爭奈無風起浪便打云也有風浪洪波浩渺白浪滔天棗樹和尚五代時在湖南界上劉王名儼居廣南僭為漢國這僧從彼中來古人出一叢林入一保社全以此事為念不似今人只管打閧過日遇人問著殊不辨端倪面赫赤地無言可對蓋謂無蘊藉底工夫也宗師家見僧便問便勘看他是箇漢別機宜辨賓主一問便知落處這僧棗樹見來似有衲僧氣息便問近離甚麼處僧云漢國樹云漢國天子還重佛法也無僧云苦哉賴值問著某甲問著別人則禍生也棗樹是作家宗師也不忙却道作箇甚麼僧云人尚不見有何佛法可重這僧擔一擔禪來棗樹當時若便打免見雪竇點檢也好老婆心切却問闍黎受戒來多少時這懵懂漢却云二十夏棗樹云大好不見有人捉他空處便打是則是犯手傷鋒了也雲門勘僧極是手親眼辨一日問僧你是甚處人僧云新羅人門云你將什麼過海僧云草賊大敗門云你為什麼在我手裏僧云恰是門云一任𨁝跳又北禪問僧近離什處僧云資福北禪云福將何資僧云兩重公案禪云為什麼在我手裏僧云一任和尚收取禪便休去看他古人句中辨別臨時折倒始為勘僧只如棗樹問僧近離甚處僧云漢國樹云漢國天子還重佛法也無僧云苦哉賴值問著某甲若問著別人即禍生也樹云作什麼僧云人尚不見有何佛法可重樹云闍黎受戒來多少時僧云二十夏樹云大好不見有人便打所以雪竇拈云這僧棒雖喫了要且去不再來雖然打了這僧却不瞥地當時莫傷鋒犯手他若省去無你撼動處古人有三度喫六十棒者且道他意作麼生雪竇云這僧恁麼喚也喚不迴頭來且道他意作麼生棗樹令雖行且道作麼生是無風起浪處具眼衲僧試去辯別看第十四則趙州偷筍舉趙州問婆子什麼處去撞着誵頭漢婆云偷趙州笋去據虎頭也不為分外又云也是本分捋虎鬚州云忽遇趙州又作麼生險婆便掌好打州便休莫道趙州休去也有陷虎之機雪竇拈云好掌更與兩掌也無勘處扶強不扶弱黨理不黨親師云這婆子本為尼因會昌沙汰更不復作尼只是參得好這箇公案諸人無事也好著眼參詳看而今眾中有一般禪和家須待長老入室小參方可做些子工夫不然終日業識茫茫游州獵縣趁溫暖處去却也趁口快說禪殊不知當面蹉過多少好事了也不見巖頭示眾道若是得底人只守閑閑地如水上按葫蘆相似觸著便轉按著便動趙州古佛便是恁麼人這老漢幸自無事却為他時時有生機處便要垂手問這婆子婆子既知是趙州且道覿面為什麼却道偷趙州笋去州云忽遇趙州時如何婆子便掌也是這老漢惹得婆子與他手脚他便休去且道趙州是箇什麼道理五祖先師拈云趙州休去不知眾中作麼生商量老僧也要露箇消息貴要眾人共知婆子雖行正令一生不了趙州被打兩掌咬斷牙關可謂婆子去國一身輕似葉趙州高名千古重如山但凡拈古須似這般手段見透古人意方可拈掇他若不如此便泥裏洗土塊雪竇為他作得這般工夫見得透前後便云好掌更與兩掌也無勘處且道雪竇意在什麼處當時作得箇甚麼道理勘得這婆子去諸人照顧切忌著掌第十五則保壽開堂舉保壽開堂三聖推出一僧萬人眾前不得不恁麼壽便打據令而行聖云恁麼為人非但瞎却這僧眼亦瞎却鎮州一城人眼去在臨濟猶在壽便歸方丈兩箇弄泥團漢雪竇拈云保壽三聖雖發明臨濟正法眼藏那裏得這箇消息來要且只解無佛處稱尊討什麼椀當時這僧若是箇漢纔被推出便與掀倒禪牀便打直饒保壽全大機用也較三千里你已在萬里崖州第二代保壽參前保壽令參父母未生已前如何是你本來面目如此數年不能省悟一日別保壽行脚去壽云汝且住當有證入令作街坊忽於閙市中見二人相爭一人勸云你輩得如此無面目壽於言下大悟後前保壽遷化祝三聖云且令作山主住十年始得開堂後三聖作請主令開堂開堂日三聖推出一僧保壽便打且道他古人意在什麼處三聖云恁麼為人瞎却鎮州一城人眼去在此處又作麼生禪和家也須子細試去體究看莫是保壽不會便歸方丈麼是何道理看他悟底人爪牙逈自不同後來僧問萬里無片雲時如何壽云青天也須喫棒臨濟遷化三聖作院生濟云吾滅後不得滅却吾正法眼藏聖云誰敢滅却和尚正法藏眼濟云忽有人問汝作麼生祇對三聖便喝濟云誰知我正法眼藏到這瞎驢邊滅却後僧舉此語請益風穴穴云密付將終全主即滅復云只如三聖一喝又作麼生穴云可謂入室之真子不同門外之游人臨濟一宗風穴親承不同小小後來南禪師道百丈耳聾猶自可三聖瞎驢愁殺人看他從上宗風豈是規模聞聽得來須是桶底子脫相似大用現前始有如此作略雪竇自蜀出峽先見北塔一住十年已有深證離北塔到大龍會中作知客亦多時大龍一日上堂師出問語者默者不是非語非默更非總是總不是拈却大用現前時人知有未審大龍如何龍云子有如是見解師云這老漢瓦解冰消龍云放你三十棒師禮拜歸眾龍却喚適來問話底僧師便出龍云老僧因什麼瓦解冰消師云轉見敗闕龍作色云尀耐尀耐師休去雪竇後行脚到南嶽舉似雅和尚雅云大龍何不與本分草料師云和尚更須行脚後大龍小師在浙中相見謂曰何不與先師燒香雪竇云昔僧問先師色身敗壞如何是堅固法身先師云山花開似錦㵎水湛如藍我誦此因緣報他恩了也後到洞山聰和尚處又參大愚芝芝嗣汾陽昭雲峰悅承嗣芝悅與雪竇游從最久久參臨濟正法眼藏宗旨雪竇最得芝和尚提誨所以雪竇會臨濟宗風雲峯悅知雪竇不嗣芝一日與游山特去勘他問云入荒田不揀信手拈來草觸目未甞無臨機何不道雪竇拈起一莖禾示之悅不肯云夢也未夢見在雪竇云你不肯即休雪竇知臨濟下宗風所以如此拈因這緣道保壽三聖雖發明臨濟正法眼藏要且只解無佛處稱尊當時這僧若是箇漢纔被推出便與推倒禪牀直饒保壽全機大用也較三千里敢問諸人只如保壽打這僧是全機不是全機只如雪竇道這僧當時若是箇漢纔被推出便與掀倒禪牀當時若便掀倒禪牀被保壽劈脊便棒時又作麼生到這裏須是頂門具眼方可見得他若未能如此也須退步體究看是箇什麼道理第十六則無業妄想舉僧問無業國師如何是佛可㬠新鮮國師云莫妄想蒼天蒼天雪竇拈云塞却鼻孔知他死來多少時也僧又問如何是佛第二重公案國師云即心是佛滿口含霜雪竇拈云拄却舌頭啞那無業國師商州上洛人母聞空中曰寄居得否覺乃有娠生而有光滿室出家後講經律并涅槃般若等論及見馬祖祖器之乃問巍巍堂堂其中無佛師於是問曰三乘等學某粗知其旨常聞禪門即心是佛實未能曉祖云即今未曉底心即是佛更無別佛又問如何是祖師密傳底心印祖云大德正閙在且去別時來師纔出祖召大德師回首祖云是什麼師便頓悟乃禮拜祖云跺跟阿師禮拜作什麼雲居錫云什麼處是汾州正閙處後來答話只云莫妄想如此者二十年一日院主云和尚休得也未他即云院主主應之他云這回休得也未直至死亦只云休得也未若道禪真箇有一句教人端的參如問佛問祖只一般答何故一百箇答做一百般只這無業老漢也大漏逗雪竇下一句語極有作略如何是佛他云莫妄想雪竇云塞却鼻孔如何是佛云即心是佛雪竇云拄却舌頭正當恁麼時舌頭又拄却鼻孔又塞却還有轉身吐氣處也無便打第十七則德山作麼舉僧問德山從上諸聖向什麼處去何不與本分草料山云作麼作麼賺殺一船人僧云敕點飛龍馬跛鱉出頭來已是落他綣繢了也山便休去此機最毒至來日山出浴其僧過茶與山山撫僧背一下且道他意作麼生僧云這老漢方始瞥地前箭猶輕後箭深雪竇拈云然精金百煉須要本分鉗鎚錯下名言德山既以己方人這僧還同受屈一狀領過以拄杖一畫云適來公案且置看雪竇有什麼伎倆從上諸聖向什麼處去或有箇掀倒禪牀又作麼生大眾擬議雪竇一時打趁打云你替大眾喫師云德山尋常打風打雨為什却不打這僧且道這僧如何可謂三級浪高魚化龍癡人猶戽夜塘水你道這老漢肯做這般去就麼這僧却道敕點飛龍馬跛鼈出頭來這裏合打且道為什麼德山不打便休去是以殺人不用刀這箇全無傷鋒犯手處若是活漢方可見得若不是頂門具眼底直下卒難摸索至來日山出浴其