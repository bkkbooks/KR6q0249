生舉聖便喝濟云誰知吾正法眼藏向這瞎驢邊滅却看他如此那裏有情解得失來只如興化向克賓維那道你是會來不入不會不入克賓道沒交涉且道他意作麼生後人情解道當初但下一喝或云以坐具便摵自然不著出院只管議論將去有什麼交涉後來住院開堂承嗣興化蓋謂他踏著向上關捩子所謂見與師齊減師半德見過於師方堪傳受那裏似如今人在情想中分得分失來不見興化一日有同參來纔相見化便喝僧亦喝化又喝僧又喝化拈拄杖僧又喝化便打云看這漢猶強作主宰在直打出法堂侍者至晚却問適來這僧有甚言句觸忤和尚化云他有權有實有照有用我將手去他面前探兩帀他却不知似這般漢不打更待何時興化一日示眾云若是作家戰將便請單刀直入更莫如何若何時有旻德長老出眾禮拜起便喝化亦喝德又喝化又喝德便禮拜歸眾興化云旻德今夜却較興化二十棒何故為他旻德會這一喝且不是喝到這裏看他宗風作略手段須是他屋裏人方可會得會得了也只易得他藥頭空些子透見雪竇道克賓維那要承嗣興化只這一句便見得雪竇會得忒好若不徹骨徹髓深入虜庭焉能知得這些子難處雪竇拈得情也盡見也除雪竇但知只拈話便了克賓知他得幾年為什麼雪竇却道今夜與克賓維那雪屈却以拄杖一時赶散大眾且道他畢竟作麼生險第二十二則長慶淘金舉僧問長慶眾手淘金誰是得者無手人得慶云有伎倆者得已是第二頭僧云學人還得也無孟八郎作麼慶云大遠在不妨減人光彩雪竇拈代云這僧當時便喝賊過後張弓復云有伎倆者得一手分付減師半德有伎倆者不得兩手分付方堪傳受學人還得也無蒼天蒼天一坑埋却便打長慶稜道者平生參請直是將死生著在額頭上坐破七箇蒲團豈似今日如存若忘初參靈雲便問如何是佛法大意靈雲道驢事未了馬事到來後舉似雪峯峯云汝豈不是蘇州人慶云某甲豈不知是蘇州人雪峯舉似玄沙沙云恐他因緣不在和尚處教伊下來某向他說慶到玄沙處舉前話沙云你是稜道者作麼生不會稜云不知靈雲與麼道意作麼生沙云只是稜道者不用外覓稜云和尚作麼生與麼說某名不可不識乞和尚說道理沙云你是兩浙人我是福州人作麼生不會稜云實不會乞和尚說破沙云我豈不是向你說也稜云某甲特地來乞和尚為說莫與麼相弄沙云你聞鼓聲也無稜云某不可不識鼓聲也沙云若聞鼓聲只是你稜云不會沙云且喫粥去便上來稜喫粥粥了便上云乞和尚說破沙云不是喫粥了也稜云乞和尚說破莫相弄某甲且辭歸去沙云你來時從那裏路來稜云大目路來沙云你去也從大目路去作麼生說相弄後於雪峯一日捲簾大悟有頌云也大差也大差捲起簾來見天下有人問我解何宗拈起拂子驀口打後來示眾道撞著道伴交肩過一生參學事畢大凡參請須要抵死謾生用做一件事頓在面前忽然似長慶恁麼桶底脫去也不妨快活須是捨長久工夫始得相應一日僧問羚羊未掛角時如何慶云草裏漢掛角後如何慶云亂呌喚看他得底人自然用處七縱八橫這僧致箇問頭也有氣息却問長慶眾手淘金誰是得者眾中謂之借事問慶云有伎倆者得雪竇便出一隻眼道有伎倆者不得這瞌睡漢更道某甲還得也無雪竇道蒼天蒼天且道他意落在甚處三日後看第二十三則大梅無意舉僧問大梅如何是祖師西來意可㬠新鮮梅云西來無意賺殺一船人僧舉似鹽官官云一箇棺木兩箇死漢是賊識賊玄沙聞舉云鹽官是作家也是火裏人雪竇云三箇也得如麻似粟成羣作隊師云雖然如是雪竇也是普州人送賊舉僧問人人有箇觀音如何是和尚觀音云云古鏡話亦然西來無意有底云無見無聞又云一切皆無若作恁麼見解一時壞了你既道無又用參請作什麼殊不知古人一期問答應病與藥截斷葛藤後人只管狂狗逐塊鹽官恁麼道且不是無意通方作者共相證明玄沙雪竇不言而喻第二十四則臨濟蒿枝舉臨濟示眾云我於先師處三度喫六十棒如蒿枝子拂相似貧兒思舊債如今更思一頓棒喫誰為下手打云已喫了也僧出眾云某甲下手莫茆廣濟拈棒與棒頭有眼僧擬接濟便打果然何故忠人無信雪竇拈云臨濟放去較危收來太速不得不恁麼不恁麼時如何棒下無生忍臨機不見師師云臨濟在黃蘗會裏三年行業純一首座歎曰雖是後生與眾有異首座問上座在此多少時云云黃蘗曰不得別處去汝向高安灘頭大愚處去云云大愚托開云汝師黃蘗非干我事一日普請鋤地濟見黃蘗拄钁而立蘗曰這漢困那云云蘗打維那濟連钁曰諸方火葬我這裏一時活埋到這裏且道與六十棒相見時如何還知他本分作家麼臨濟從此一喝起來如今向劒刃上求人今人却換作移喚他有什麼氣息臨濟溈山處見仰山云我欲向北去建立黃蘗宗旨仰山云若到彼中有二人輔佐你只是有頭無尾濟到河北住一小院普化克符先在彼中濟謂二人曰我欲於此建立黃蘗宗旨汝且須成褫我二人珍重便下去次日普化上堂問云和尚前日說什麼濟便打又一日克符上來問和尚打普化作什麼濟亦打至晚小參示眾云有時奪人不奪境有時奪境不奪人有時人境俱奪有時人境俱不奪克符出眾便問如何是奪人不奪境濟云煦日發生鋪地錦嬰兒垂髮白如絲如何是奪境不奪人濟云王令已行天下徧將軍塞外絕烟塵如何是人境俱奪濟云并汾絕信獨處一方如何是人境俱不奪濟云王居寶殿野老謳歌符禮拜濟便打臨濟宗風從來捋虎鬚致使後代兒孫爪牙卓朔地他一日示眾云我於先師處三度喫六十棒如蒿枝子拂相似如今更思一頓棒喫誰為下手須得箇茆廣漢大膽出來擬議之間濟便打雪竇拈來眼親便見云放去較危收來太速第二十五則師祖珠藏舉師祖問南泉摩尼珠人不識如來藏裏親收得如何是如來藏放下着泉云王老師與你往來者是藏打葛藤作什麼雪竇云草裏漢有些子祖云不往來者兩重公案泉云亦是藏有什麼共語處雪竇云雪上加霜灼然祖云如何是珠打云是什麼雪竇云險着了也百尺竿頭作伎倆不是好手這裏著得箇眼賓主互換便能深入虎穴且道具什麼眼直得賓主互換想闍黎作這般手脚不得或不恁麼縱饒師祖悟去也是龍頭蛇尾漢說什麼龍頭蛇尾更好與三十棒何故為他只恁麼不能不恁麼師云獲珠吟擁之令聚而不聚撥之令散而不散側耳欲聞而不聞瞪目觀之而不見又有者道南泉老婆心切古人到這無心境界恁麼道也得不恁麼道也得識取鈎頭意莫認定盤星草裏漢雪上加霜雪竇這兩橛且不得隨語生解會師祖問如何是珠泉召師祖師祖應諾泉云出去祖便悟雪竇云險若要親切須著箇眼看主賓互換臨機獨用同得同證有轉變出身處始得舉清八路問羅山仰山插鍬叉手意旨如何山云清尚座你還曾夢見仰山麼第二十六則鏡清問僧舉鏡清問僧趙州喫茶去你作麼生會明珠不合彈雀兒僧便出去似則似是則不是清云邯鄲學唐步一手擡一手搦雪竇拈云這僧不是邯鄲人為什麼學唐步扶強不扶弱若辨得出與你喫茶且喜沒交涉師云邯鄲乃是趙國其人善行宋人往學之不成唐捐其功云云故云邯鄲學步匍匐而歸云云雪竇錯會莊子意云云不免將錯就錯南禪師頌云相逢相問知來歷云云雪竇大意只拈他二人相見處第二十七則雲門法身舉僧問雲門如何是法身向上事天下衲僧疑着門云向上與汝道即不難作麼生會法身慣得其便僧云請和尚鑑看門云鑑即且置作麼生會法身第二陣施旗槍來也僧云恁麼恁麼分疎不下門云這箇是長連牀上學得底我且問你法身還喫飯麼忒㬠無佛法身心若是我當時只向他道草賊大敗便走僧無語這漢飽喫了飯却作這般去就雪竇拈云將成九仞之山不進一簣之土山僧適來也道了也過在什麼處打云只是喫飯漢師云僧問仰山法身還解說法也無仰山推枕子話云云溈山聞云寂子用劒刃上事又舉陳操尚書問衲僧本分事云云請和尚鑑這僧不妨奇特爭奈雲門是作家向虎口裏橫身恁麼恁麼更僻在閑處便見者草賊大敗雪竇恁麼拈人道什麼第二十八則三聖金鱗舉三聖問雪峯透網金鱗以何為食擔枷過狀自己也不知峯云待汝出網來即向汝道鈍滯殺人聖云一千五百人善知識話頭也不識一任𨁝跳峯云老僧住持事繁時人盡道雪峯有陷虎之機要且不然雪竇云可惜放過好與三十棒這棒一棒也饒不得為什麼如此直是罕遇作家便打你也未是作家師云問透網金鱗以何為食若是擔板漢決定向食處作活計作家宗師不妨奇特待汝出網來即向汝道且道是曾出網來不曾出網來聖云一千五百人善知識云云此語也毒雪竇猶自道未在好與三十棒其意要顯本分草料向雪峯頭上行諸人若要轉變自在處麼不然辜負雪峯雪竇便打是有過是無過你若辨得出拄杖子屬你第二十九則伏牛馳書舉伏牛為馬祖馳書到國師處師問馬祖有何言句示人當時便喝免見葛藤牛云即心即佛蒼天蒼天國師云是什麼話灼然不放過良久再問更有什麼言句好便與一喝牛云不是心不是佛不是物漏逗不少國師云猶較些子也只是隨邪逐惡雪竇代云當時便喝已是第二重公案牛却問和尚此間如何也好國師云三點如流水曲似刈禾鎌更是葛藤雪竇云是什麼語話不是雪竇也不知落處也好與一拶拶即不無且道雪竇意落在什麼處見之不取千載難忘打云着師云伏牛是馬祖下八十四人之一數與丹霞為方外知音通儒書講教國師垂問伏牛只合便道不是心不是佛不是物為什麼先道即心是佛可謂作家禪客不辱宗風雪竇代云伏牛等國師問馬祖有何言句便下一喝諸人若辨得這一喝下面一落索一時辨得國師道猶較些子雪竇代云便喝不可道國師不是雪竇更要向上行前頭即心是佛後面不是心不是佛不是物伏牛却問國師云三點如流水曲似刈禾鎌俱是心雪竇代伏牛出氣不妨是作家鉗鎚番覆看方見雪竇有工夫得其妙處諸人若向雪竇也好與一拶處參得徹許汝有回互轉變處第三十則玄沙過患舉玄沙問鏡清我不見一法為大過患你道不見什麼法和尚自屎不覺臭清指露柱云莫是不見這箇法第二頭承當玄沙云浙中清水白米從你喫佛法則未在招他恁麼道雪竇云大小鏡清被玄沙熱瞞只這雪竇也無出身處我當時若見但向他道靈山授記也未到如此只恐你承當不下師云鏡清住越州鏡湖三十年舉一宿覺鄉人話玄沙問得漏逗云云鏡清答得郎當何故如此只為伊識破來處如排兩陣彼此相向只對些子機鋒舉涅槃經中菩薩摩訶薩不見一法過於嗔者六根本中唯嗔最毒玄沙云不見什麼法問得言中有響莫是不見云云答處早轉變了也鏡清道莫是二字大有淆訛爭奈鏡清皮下有血玄沙眼裏有筋二俱好手兩不相饒此皆從上來命脈浙江將為鍛煉語第三十一則報慈問僧舉先報慈問僧近離什處也要驗過僧云臥龍實頭人難得慈云在彼多少時好與一拶僧云經冬過夏也好箇坦蕩漢慈云龍門無宿客為什麼在彼許多時也好驗過僧云獅子窟中無異獸兩頭三面慈云汝試作獅子吼看拈一放一僧云若作獅子吼即無和尚也雖然落草却有主宰慈云念汝新到且放三十棒彼此鈍滯雪竇云奇怪諸禪德若平展則兩不相傷遞相鈍滯有什麼用處據令則彼此俱險一時喪身失命還點撿得麼打云險師云此箇公案賓主相見如排刀鎗大陣却用特石畢竟却不失血脈獅子窟中無異獸料掉沒交涉却有活處云念汝新到且放汝三十棒死中得活從頭都放過何故合用處却不用不用處又却活潑潑地雪竇拈平展則兩不相傷龍門無宿客已是平展且道甚麼處是險處第三十二則船子絲綸舉船子頌云千尺絲綸直下垂一波纔動萬波隨有麼有麼夜靜水寒魚不食滿船空載月明歸勞而無功雪竇云這老漢勞而無功已在言前或若雲門道一句合頭語萬劫繫驢橛正中這漢毒藥又作麼生免此過用免作什麼良久云莫道水寒魚不食如今釣得滿船歸終是有心師云船子和尚三頌唯此一頌最為深妙舉洛浦龍潭答木平話舉夾山見船子話一波纔動萬波隨山僧道有麼有麼畢竟作麼生夜靜水寒魚不食云云合頭語本是船子語後來雲門愛舉雪竇用作雲門語既是船子語為什麼却有合頭話雪竇見他語墮在這裏所以與他開一線道活路第三十三則投子一言舉投子問巨榮禪客老僧未曾有一言半句掛諸方耳目何用要見山僧莫謗人好僧云到這裏不施三拜要且不甘見機而作子云出家兒得恁麼沒記和尚慣用此機僧遶禪牀一匝而出將為胡鬚赤更有赤鬚胡子云有眼無耳朵六月火邊坐賊過後張弓雪竇云也不得放過作麼生纔轉便與擒住喝云是誰不甘咄若跳得出不妨是一員衲僧你也跳不出了也師云巨榮禪客諸方常有問答話收放作家爭奈投子是奇人鈎頭有餌喫著則喪身失命可謂得逸羣之用釣得來鎚得破有般底呼得來遣不去畢竟干戈作亂子云出家兒得恁麼沒記蓋無知見這僧也是淆訛却不禮拜遶禪牀而出若是別人無奈他何投子也不忙云有眼無耳朵六月火邊坐這僧有無轉變作用云云投子末後一句蓋是從上來人行履這箇唯趙州會得投子意若是諸人當時被投子擒住合下什麼語第三十四則祖師六塵舉祖師云六塵不惡還同正覺眼見耳聞有什麼過雪竇云拄杖子是塵有什麼過這老漢又要第二杓惡水在過既無應合辨主第三頭藏身露影所以道糞掃堆上現丈六金身且拈在一邊作家宗師終不藏身露影赤肉團上壁立千仞又放過一著弄精魂漢有什麼限直饒八面四方正好連架打打云已落第八頭師云信心銘云云見聞覺知無障礙聲香味觸常三昧雲門云一切處不是三昧有聲香味觸體在一邊聲香味觸在一邊見解偏枯又云即此見聞非見聞更無聲色可呈君洞山云塵中不染丈夫兒雲門云拄杖子但喚作拄杖子一切但喚作一切塵勞之儔為如來種六塵只得不唧𠺕二乘等人如焦糓芽不復再生又本仁道色不是色聲不是聲六塵皆然畢竟如何還同正覺智與理冥境與神會云云心如境亦如無實亦無虗過既無拄杖頭上須辨箇主賓不可儱儱侗侗糞掃堆上現丈六金身見悟本語赤肉團上壁立千仞是臨濟語雪竇道此二人俱未有主在第三十五則本生拄杖舉本生以拄杖示眾云也是一場狼藉我若拈起你便向未拈起時作道理我若不拈起你便向拈起時作主宰尖上更加尖且道老僧為人在什麼處當時若與本分草料時有僧出云不敢妄生節目是即是太簾纖生云也是闍黎不分外未是好心僧云低低處平之有餘高高處觀之不足似恁麼衲僧一箇半箇則得千箇萬箇無處覓生云節目上更生節目也不放過僧無語灼然龍頭蛇尾生云掩鼻偷香空招罪犯據款結案雪竇云這僧也善能切磋爭奈弓折箭盡也有些子然雖如此且本生是作家宗師為人在什麼處若不是作家爭解恁麼道拈起也天回地轉應須拱手歸降那裏得這消息來放下也草偃風行必合全身遠害打云也須喫三十棒始得還見本生為人處也無拗折拄杖子作麼生為人雪竇復拈起拄杖子云太平本是將軍致不許將軍見太平口如楄擔眼如木𣔻且道拄杖子在什麼處瞎漢師云諸人且道拄杖子為人在什麼處且道拈起是不拈起是若是頂門上有眼底漢朕兆未萌前薦去即得若向正令已行後作主宰卒摸索不著僧云不敢妄生節目也是箇圓陀陀底漢節目上更加節目且道是罰是賞僧無語生云掩鼻偷香空招罪犯當時合下得箇什麼語免得本生恁麼道看他賓主相酬兩口劒相似雪竇道這僧也善能切磋爭奈弓折箭盡別人只拈到這裏雪竇有餘才拈起則天回地轉應須拱手歸降放下也草偃風行必合全身遠害本生會瞻前顧後不失血脈本生公案雪竇拈得也好不見道太平本是將軍致不許將軍見太平第三十六則安國伊蘭舉安國問僧得之於心伊蘭作旃檀之樹逢強即弱失之於旨甘露乃蒺䔧之園遇賤即貴我要箇語具得失兩意乃竪起拂子云且道喚作拂子不喚作拂子僧竪起拳云不可喚作拳頭不可喚作拳頭喚作什麼弄泥團漢國云只為喚作拳頭也是兩箇無孔鐵鎚雪竇云無繩自縛漢拳頭也不識三箇也得師云雖然如是盡是義學沙門師云安國承嗣雪峯此是忠國師塔銘語云得之於心伊蘭作旃檀之樹失之於旨甘露乃蒺䔧之園舉正人說邪法邪法即為正邪人說正法正法即為邪得之於心伊蘭作旃檀之樹逢強即弱失之於旨甘露乃蒺䔧之園遇賤即貴我要箇語具得失兩意是時會中也有恁麼人此箇下語不失宗旨雪竇依樣畫猫兒三箇一時恁麼教山僧作麼生第三十七則玄沙見虎舉玄沙與天龍入山見虎㘞龍云前面是虎好箇消息沙云是汝漏逗不少雪竇云要與人天為師面前端的是虎山僧也恁麼天下人恁麼用祖師作什麼師云天龍與玄沙入山見此機緣有什麼省處舉雪峯下有孚上座見虎云某甲甚怕怖峯云是你屋裏事怕作什麼要明盡大地是沙門一隻眼坐斷天下人舌頭識取這箇時節不見道一塵纔起大地全收一毛頭獅子百億毛頭一時現莫道物為己南閻浮提有四種重障若人透過不落陰界山不是山水不是水虎不是虎物不是物若乃情盡無不皆是更無是物皆同一體作用雲門道盡乾坤大地無一纖毫云云若向這裏見得玄沙便乃見玄見妙見佛見祖見顛見狂山是山水是水虎是虎物是物各歸本位各著平實處也為人不得須是恁麼也不得不恁麼也不得恁麼不恁麼不恁麼却恁麼更買草鞋行脚三十年是有坐斷是無坐斷也未在且道畢竟作麼生參
