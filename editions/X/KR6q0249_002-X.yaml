body:
  text: 雪竇明覺禪師拈古佛果圜悟禪師擊節第三十八則洞山三頓舉洞山初和尚到雲門門問近離什麼處常程途山云查渡實頭人難得門云夏在什麼處第二頭箭鋒也須着眼山云湖南報慈可㬠不瞞人門云幾時離彼中三重公案山云去年八月只為脚不踏實地門云放汝三頓棒天下衲僧只知有恁麼事殊不知有不恁麼事山至來日却上問訊昨日蒙和尚放三頓棒不知過在什麼處果然摸𢱢不着門云飯袋子江西湖南便恁麼商量去可惜許山於此大悟還曾夢見也未雪竇拈云雲門氣宇如王不妨孤危峭峻拶著便氷消瓦解草裏輥當時若據令而行令人常憶龐居士子孫也未到斷絕你也替他喫棒師云大溈真如和尚愛教人看這因緣拈人情解雲門道近離什處山云查渡此放一頓棒又云夏在什處山云湖南報慈此是放一頓棒幾時離彼中來山云去年八月此是放一頓棒只管情解道分明是三頓棒且喜沒交涉又有一般道洞山實頭所以放他三頓棒又有底道當時便好一喝若論如何若何更是狂見一時不恁麼畢竟作麼生所以古人道承言須會宗勿自立規矩雪竇要打他道飯袋子江西湖南便恁麼商量正好打雲門雖然養子方知父慈拈他情解便會只為雲門語好便發得悟處有本收削去商量二字只云江西湖南便恁麼去一悟後便道我已後向十字街頭卓箇庵不蓄一粒米不種一莖菜接待十方知識與他拈却炙脂帽子脫却鶻臭布衫令教洒洒落落箇箇做無事道人去一如臨濟當時去見大愚只被大愚拈他情見便會得徹且道這箇是如何古人一言一句轉凡成聖點鐵成金所謂粉骨碎身未足酬一句了然超百億後來僧問如何是佛便只道麻三斤看他那裏是安排得來祖師門下一便見那裏有許多般千聖萬聖挨拶教人見到這裏雖然點破綱宗要且意在未屙時明眼漢沒窠臼所以巖頭道若論戰也箇箇立在轉處向未痾時一便見廓天一路相似靈利漢疑著處一點便會雪竇拈云雲門一似覇王相似因什麼拶著便冰消瓦解雪竇嫌雲門老婆心如此當時真箇好打到這裏拈則許你拈會則不許你會若只恁麼會又錯了也當時劈脊便打赶出去已放過了也教他後來道如何是佛麻三斤前也不著村後也不著店天下人不奈何或若奈何時如何鼻孔撩天第三十九則大慈示眾舉大慈示眾云山僧不解答話只是識病自病教阿誰識時有僧出須是放過大慈便歸方丈且道這僧患什麼病雪竇拈云大凡扶竪宗乘須是辨箇得失果然且大慈識病不答話時有僧出便歸方丈膏肓之病決不可醫雪竇識病不答話或有僧出劈脊便棒且道這一服藥醫得什麼病諸方識病不答話有僧出必然別有長處不可只守他途轍去敢有一箇動著大唐天子只三人打云如麻似粟師云杭州大慈乃馬祖下尊宿蒲坂人頂骨聳高其聲如鐘一日示眾云大慈不解答話只是識病且道這僧病在什麼處法眼道眾中喚作病在目前不識玄覺云且道大慈識病不識病此僧出來是病不是病若言是病逐日行住坐臥不可總是病若言不是病出來圖箇什麼大慈後來示眾云說得一丈不如行取一尺說得一尺不如行取一寸洞山聞云我即不恁麼僧云和尚作麼生山云說取行不得底行取說不得底雲居云行時無說路說時無行路不說不行時合行什麼路洛浦云行說俱到即是本分事無行說俱不到即本分事在不見趙州小參示眾云今夜答話去也有解問者試出來看時有僧出禮拜州云適來拋磚引玉却引得箇擊子又資福云隔江見資福剎竿便回去脚跟下好與三十棒何況過江來只如大慈如此示眾便有僧出大慈見不堪與語便歸方丈古人下鈎釣鯤鯨豈與你撈蝦摝蜆來你若是箇漢纔上來却與你辨明且道大慈意畢竟作麼生諸人試去子細參詳看時作麼生雪竇拈云大凡扶竪宗乘須是辨箇得失雪竇既如此拈且道什麼處是辨得失處雪竇自云識病不答話或有僧出劈脊便棒且道此意又作麼生這箇與古人齊肩並駕往往更加出古人方可敢拈公案自家既參不透向什麼處見古人向什麼處下手拈掇雪竇拈得好且到諸方識病不答話有僧出必然別有長處敢問諸人且道作麼生是諸方長處諸公拈一條拄杖到處行脚他時或被人推向曲彔木床上坐或有人出來且作周向識病大唐天子只三人這一句乃周朴詩雪竇穿作一串拈大慈拈諸方只這雪竇也有些子點胸且道什麼處是他長處如是不肯天下人這箇老漢有衲僧拄杖子又有金剛眼睛也有七事隨身若是不得底人布袋裏老鴉雖活如死得底人如虎插翅戴角相似自然不受人羅籠周朴贈大溈詩云禪是大溈詩是朴大唐天子只三人第四十則黃蘗閉門舉趙州州黃蘗兩箇老賊蘗見來便閉却方丈門孟甞門下州云救火救火果然不謬為朱履客蘗便出擒住云道道兩重公案州云賊過後張弓遭這漢手脚雪竇拈云直是好笑旁人有眼笑須三十年為什麼如此忽有人問雪竇笑箇什麼更問作什麼笑賊過後張弓打云也未放過師云趙州到黃蘗蘗便閉却方丈門一似電光石火相似若是懵懂禪和見人纔閉却門却必無奈何看他趙州與黃蘗二俱作家神通游戲妙用自在趙州却云救火救火這老賊黃蘗當時便打兩掌他也不奈何什麼處是賊過後張弓處惹得雪竇道直是好笑笑須三十年雪竇笑不是好心笑中有刀第四十一則鏡清方便舉僧問鏡清學人未達其源乞師方便放下著清云是什麼源拶僧云其源著清云若是其源爭受方便却將惡水驀頭澆雪竇云死水裏浸却有什麼用處作麼生是活水裏底侍者問清適來是成褫伊清云無鐵彈子好箇消息者云是不成褫伊清云無金剛圈子也好消息者云和尚尊意如何清云一點水墨兩處成龍終是打葛藤雪竇云猶較些子同坑無異土雪竇不是減鏡清威光有什麼威光要與這僧相見還識這僧麼是什麼源其源三十年後與你三十棒打云如今須喫師云鏡清一十七歲行脚參見雪峰峰問什麼處人清云溫州人峰云却與一宿覺同鄉人清云且道一宿覺是什麼處人雪峰笑乃器之只如這僧問鏡清學人未達其源乞師方便清云是什麼源僧云其源清云若是其源爭受方便且道鏡清是有指示無指示還會他道一點水墨兩處成龍麼不可也教山僧和泥合水去也一日有僧請益次清揖坐僧云禮拜了後有少事僧禮拜了清問云有甚麼事僧云不落四威儀請師道清云更禮三拜僧至明日上問某甲過在什麼處清云語不離窠臼焉能出蓋纏片雲生晚谷迷却幾人源雪竇云不是減鏡清威光要與這僧相見雪竇尋常末後愛品弄所以道三十年後與你三十棒諸人無事也試去參詳看落著處如何第四十二則香林衲衣舉僧問香林如何是衲衣下事闍黎還曾行脚麼林云臘月火燒山千重百匝滴水滴凍雪竇拈云臘月燒山萬種千般相隨來也翹松鶴冷左眼半斤踏雪人寒右眼八兩達磨不會猶較些子大難大難有什麼難師云僧問如何是衲衣下事香林道臘月火燒山雲門道臘月二十五看看臘月盡香林子承父業何故如此只為他家有本分事在若是靈利漢向舉處便會多少直截所以道大丈夫秉慧劒般若鋒兮金剛焰又道譬如擲劍揮空莫論及與不及若是箇本色衲僧那裏取別人口頭辨來古人道我愛韶陽新定機一生與人拔釘楔雪竇具眼便道臘月燒山萬種千般雪竇向藕絲孔裏包含大千沙界故云我為法王於法自在翹松鶴冷踏雪人寒恐人便向言句裏作活計轉生情解末後蓋覆將來却云達磨不會大難大難諸人還會麼且參三十年悟去也不定第四十三則本仁示眾舉本仁示眾云尋常不欲向聲前句後鼓弄人家男女也打葛藤不少何故且聲不是聲猶較些子色不是色兩重公案時有僧問如何是聲不是聲只恐跳不出仁云喚作色得麼果然僧云如何是色不是色仁云喚作聲得麼又恁麼去也僧禮拜果然仁云且道為汝說答汝話若向這裡辨得許汝有箇入處什處得這一落索來雪竇拈云本仁也甚奇怪見什麼要且貪觀天上月也是亂指注既非聲前句後且作麼生入從這裏入師云本仁高安人嗣洞山价大溈秀拈云本仁只知橫千不知竪萬如何是聲不是聲莫逐音響如何是色不是色莫逐青黃且他問聲前句後覓箇安身處自然別有生涯雪竇意如此大凡垂示不須這誵訛處方釣得他這僧出來爭奈本仁是作家宗師能據虎頭收虎尾直得壁立千仞這僧出來也不妨奇特雖然如是也須照顧始得第四十四則國師三喚舉國師三喚侍者也是熱發雪竇著語云點即不到著侍者三應也是草裏出頭來雪竇著語云到即不點過將為吾辜負汝誰知汝辜負吾這老漢作恁麼去就雪竇著語云瞞雪竇不得也被瞞了也雲門道作麼生是國師辜負侍者處老老大大面皮厚三寸會得也是無端因什麼隨他脚跟轉雪竇云元來不會咄門又云作麼生是侍者辜負國師處承當得也未粉骨碎身未報得辜恩負德作什麼雪竇云無端無端自領出頭第四十五則投子抑逼復舉僧問投子國師三喚侍者意指如何投子云抑逼人作麼亂呌喚雪竇云跺跟漢也是鬼窟裏作活計僧問興化化云一盲引眾盲以己方人雪竇云端的瞎兩箇也得僧問玄沙沙云侍者却會爛泥裏有刺雪竇云停囚長智捉賊僧問趙州州云如人暗中書字字雖不成文彩已彰老賊雪竇便喝放過即不可僧問雪竇雪竇便打也是賊過後張弓也要諸方點撿放你不得乃成頌云師資會遇意非輕輥芥投針無事相將草裏行也是無端負汝負吾人莫問天下人跳不出任從天下競頭爭阿喇喇閙聒聒師云諸人各各自有箇國師各各自有箇侍者無事請辨看法眼云且去別時來雪竇云瞞我不得玄覺徵云什處是侍者會處僧云若不會爭解恁麼應覺云你欠會在又云於此見得便見玄沙翠巖芝云國師侍者總欠悟在而今作麼生會第四十六則雲門示眾舉雲門示眾老胡生下時一手指天一手指地目顧四方周行七步白浪滔天云天上天下唯我獨尊討什麼屎臭氣當時若見一棒打殺與狗子喫也是賊過張弓貴圖天下太平干戈競起雪竇拈云便與掀倒禪床也是第二機師云雲門大師但發一言半句驚天動地雪竇是他家屋裏兒孫知有恁麼事諸公合作箇什麼伎倆見得雪竇去第四十七則智門草鞋舉僧問智門如何是佛却問著箇乾屎橛門云踏破草鞋赤脚走一等是拖泥帶水僧云如何是佛向上事元來有向上向下門云拄杖頭上挑日月摩醯首羅雪竇拈云千兵易得一將難求子不談父德師云雪竇拈古著著有出身之路縱橫自在不向死水裏浸却是他有這般手段不顧危亡便恁麼拈弄何故為是他識得智門根源所以恁麼拈出教人不要作情解今之參學兄弟只管去記持言句有什麼交涉你不看這僧問處智門答處如何切須子細著些子工夫參來參去決定見得第四十八則雪峰五棒舉僧禮拜雪峰峰打五棒是則是不惜眉毛太㬠僧云某甲有什麼過這漢皮下還有血麼峰又打五棒前箭雖輕後箭深雪竇拈云雪竇不曾與人打葛藤猶在前五棒日照天臨後五棒雲騰致雨定龍蛇別緇素不無雪竇拄杖子還將得來也未你若辨得也好與五棒打云果然師云你諸人還會麼因什麼不打四棒不打六棒僧後參巖頭頭打五掌且道與五棒是同是別一等是放行不妨奇特用得好如人善射箭箭中的前五棒日照天臨萬象不能逃影後五棒雲騰致雨這僧覓過雪峰又打且道是雲是雨雪竇要與人抽釘拔楔大溈秀云這僧腦門著地過犯彌天雪峰輕恕猶自不知罪名再犯不容更道日照天臨雲騰致雨惑亂後學可謂曾被雪霜苦楊花落也驚第四十九則徑山一點舉馬大師令智藏持書上徑山書中不知有什消息山接書開見一圓相道什麼於中下一點也把不住國師聞舉云欽師猶被馬師惑是精識精是賊識賊雪竇云徑山被惑且置若將呈似國師別作箇什麼伎倆免被惑去拄杖子未折在盡大地人總須喫棒有老宿云當時坐却便休也是將南作北亦有道但與劃破轉見勿交涉若與麼只是不識羞一切人笑你敢謂天下老師各具金剛眼睛廣作神通變化還免得麼也是後無老宿雪竇見處也要諸人共知看他雪竇敗闕只這馬師當時畫出早是自惑亂了也只如雪竇恁麼分踈還免得惑也未師云釣鼇時下一棬圝保福云什麼處是惑處作麼生得不惑去五祖戒云兩彩一賽又云三人指路擬何為大溈喆云還識馬師徑山麼一點水墨兩處成龍國師云欽師猶被馬師惑可謂千里同風不見道手執夜明符幾箇知天曉又有云畫圓相本無事不合下一點不然作禪會喚作大圓鏡智人人盡是狂見不識羞十四祖龍樹尊者於法座上隱身現圓相提婆云此是我師現圓相義昔日國師有一百二十種圓相傳與躭源源後與仰山山燒却源云般若多羅讖云小小沙彌有大機溈仰宗以境智只這圓相又過如舉拂子竪指行棒行喝雪竇恁麼拈可見古人意第五十則睦州擔板舉睦州喚僧大德僧回首兩箇瞎漢州云擔板漢汝與他同參雪竇拈云睦州只具一隻眼莫謗睦州好何故這僧喚既回首因什却成擔板漢正是擔板師云且道睦州落在什麼處這僧落在什麼處僧問以字不成八字不是是何章句州彈指一聲云會麼僧云不會州云上來講讚無限良因蝦蟆跳上梵天蚯蚓驀過東海有新到僧來方禮拜州叱之闍黎因何偷我常住果子僧云學人纔到和尚因何却道偷常住果子州云贓物現在且道作麼生是這僧擔板處直是難參雪竇分明與你拈了也第五十一則巴陵示眾舉巴陵示眾云祖師道不是風動不是幡動干戈競起既不是風幡向什麼處著眉毛眼睫上有人與祖師作主出來與巴陵相見者老賊𥧌語作麼雪竇道風動幡動也是干戈既是風幡向什麼處著已在言前有人與巴陵作主亦出來與雪竇相見這老賊亦𥧌語師云這箇是拈古格則師復舉盧能初見五祖事後到四會縣被獵人擒去守網四箇月又引二上座議風幡話印宗問云忽然大悟雪峰云大小祖師龍頭蛇尾好與三十棒太原孚侍立齩齒峰云老僧與麼道合喫三十棒保福云作賊人心虗蕭何致律五祖戒云著什來由又云不合道末後語只為箇心之一字錯認光影第五十二則則川摘茶舉則川與龐居士摘茶次士云法界不容身師還見我麼漏逗漢有什麼難見處川云若不是老僧洎與龐公答話是則是忒煞不近人情士云有問有答蓋是尋常劈口便掌川不管也是不近人情士云適來莫怪相借問麼好與一掌川亦不管也是不近人情士喝云這無禮儀漢待我一一舉似明眼人去在引得狼來屋裏痾川拈茶藍便歸賴有末後句若無末後句誰敢喚作則川雪竇云則川只解把定疆封不能同生同死雪竇也是據欵結案當時好與捋下幞頭誰敢喚作龐居士未免旁觀者哂師云雖然只是打淨潔毬子也打得好末後為什麼却不答他話作家相見有始有終有者道洎與龐公答話被公作亂一上識法者懼則川所以如此雪竇道只解把定疆封且莫向雪竇句下錯會你且道則川是答他話不答他話若會得去拍拍都是令或有向你道作麼生是則川把定疆封處作麼生對他雖然恁麼拈不許恁麼會殊不知當機覿面提覿面當機疾第五十三則雲門裂破舉僧問雲門一言道盡時如何道什麼門云裂破南瞻部洲北俱盧洲雪竇彈指三下也是隨語生解師云挑囊負鉢撥草瞻風到一方一所見有本分正眼宗師放下複子便與他老漢錐劄看是如何可住不可住這僧致箇問端向一言道盡處問他雲門這老漢不忙向道裂破奇特雲門有如此機鋒亦要這僧不向情解上見故如此答後來雪竇恁麼也不是好心第五十四則睦州鉢囊舉僧問睦州一言道盡時如何兩重公案州云老僧在你鉢囊裏放憨作麼雪竇呵呵大笑猶較些子師云睦州尋常機如掣電有衲僧巴鼻這僧如此問睦州如此答且道與雲門答處是同是別若道是別佛法有兩般若道是同為什麼問處則一答處兩般須是透到無疑處方見徹修心未到無心地萬種千般逐水流雪竇呵呵大笑是什麼道理試辨看第五十五則雪峰三下舉僧問雪峰聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何三段不同峰打三下斬釘截鐵其僧復問巖頭頭打三掌同途不同轍雪竇云應病設藥且打三下說得道理若據令而行合喫多少打云只打一掌師云尋常聞人說無迷無悟只是建立無中唱有且喜勿交涉據實見處晝見日夜見月未必為奇特三下三掌若喚作棒有什麼交涉為什麼只打三下雪竇道據令而行合打多少放過一著第五十六則南泉出世舉南泉山下有一庵主行僧經過謂庵主云近日南泉和尚出世何不去禮拜與別人說即得與庵主說則禍生主云非但南泉直饒千佛出世亦不能去果然泉聞令趙州去看也須是這老賊始得州見便禮拜直得風行草偃主不管沒奈何州從西過東鳥飛毛落魚行水濁主亦不管雪上加霜州又從東過西只得恁麼主亦不管三重公案州云草賊大敗拽下簾子便行只得恁麼歸舉似南泉泉云我從來疑著這漢兩箇一狀領過雪竇拈云大小南泉趙州被箇擔板漢勘破了也扶強不扶弱師云庵主雖然恁麼且只會打淨潔毬子不如南泉趙州有為人底鉗鎚古人出一則語須是頭尾相覆他一向不管且道得箇什麼道理便恁麼也須是脚踏實地到那無事處方始恁麼趙州見便禮拜末後云草賊大敗拽下簾子便行且道勘得他麼若勘不得南泉趙州皆古佛間生他眼在什麼處泉云從來疑著這漢恁麼道是許他是不許他須是頂門具眼肘後有符方知落處雪竇拈云大小南泉趙州被箇擔板漢勘破你且道他作麼生是擔板處試著眼看第五十七則欽山恁麼舉巖頭雪峰欽山到德山欽山問天皇也恁麼道龍潭也恁麼道渾侖吞箇棗未審和尚作麼生道險德山云你試舉天皇龍潭底看拶著這尿床鬼子欽山擬議駕與青龍不解騎山便打本合是德山喫欽山被打歸延壽堂也則令行一半直教氣息一點也無始得云是則是打我太煞賊過後張弓巖頭云汝恁麼他後不得道見德山來肘臂不向外雪竇云諸禪德欽山致箇問端不妨奇特爭奈龍頭蛇尾知他幾時向鬼窟裏作活計來你試舉天皇龍潭底看坐具便摵停囚長智大丈夫漢捋虎鬚也是本分不用說道理他既不能德山令行一半果然令若盡行雪峰巖頭總是涅槃堂裏漢打云闍黎也須入涅槃堂始得師云巖頭擔鋤頭行脚到處只做園頭雪峰擔笊籬木杓行脚到處作典座欽山將熨斗剪刀針線行脚到處與人做衣到箇所住處三人互為賓主作小參舉公案欽山承當不得後來却到洞山契證法嗣洞山舉三人參德山話欽山致箇問頭也好被德山一拶直得忘前失後德山便打為他未徹在灼然是承當不得欽山既是落節後人已知德山大開門戶去這裏胡答亂答總被生機一拶諸人又作麼生欽山歸寮云是即是打我大㬠巖頭云汝恁麼他後不得道見德山來雪峰巖頭欲識拽過教乘這漢依前擔板巖頭若不是蘊藉將來爭解恁麼道大凡拈公案須是見得破公案識得縫罅雪竇解把定放行回轉拈得不妨有通變處翠巖芝云欽山只顧其前不顧其後如今作麼生與欽山出一口氣大溈喆云德山門下草偃風行大溈即不然待問未審和尚作麼生拈棒劈脊便打且道德山是溈山是會麼橫按鏌鎁全正令太平寰宇斬癡頑第五十八則玄沙問僧舉玄沙問僧近離什麼處也要知他來處僧云瑞巖這僧徃往舉瑞巖話去也沙云瑞巖有何言句第二杓僧云長喚主人公還識羞麼自云喏弄泥團漢惺惺著他後莫受人瞞自瞞了也不知沙云一等是弄精魂也甚奇特若不別識爭辨真偽却云何不且在彼中事生也僧云瑞巖遷化了也死而不弔沙云如今還喚得應麼作什麼僧無對打云由在雪竇云蒼天蒼天好一坑埋却師云且道古人三十四年喚作什麼無人識得他却喚作弄精魂有云昭昭靈靈建立且喜勿交涉會則途中受用不會則世諦流布唯有玄沙風穴會得好穴云自拈自弄有什麼難玄沙云甚奇特既是弄精魂為什麼却有奇特如今還喚得應麼這一句奇特這裏著得一隻眼親見瑞巖所以雪竇云蒼天蒼天第五十九則長慶羚羊舉僧問長慶羚羊未掛角時如何闍黎亂走作什麼慶云草裏漢果然僧云掛角後如何你還識得渠麼慶云亂呌喚草繩自縛僧云畢竟如何蒼天蒼天慶云驢事未了馬事到來拈一放一雪竇云寧可碎身如微塵終不瞎箇眾生眼錯下名言長慶較些些子未夢見在有般漢設使羚羊未掛角也似萬里望鄉關正說著闍黎師云長慶自悔話後悟云苦哉苦哉疑我十五年後因捲簾悟道有言云我有一棒到你你也須知來處始得舉雲居六六三十六趙州九九八十一長慶勝如趙州雲居底雪竇道寧可碎身如微塵終不瞎箇眾生眼長慶較些些子意在提向上事長慶是箇中人第六十則圓明示眾舉德山圓明示眾云但有問答只竪一指頭依樣畫猫兒寒則普天普地寒蒼天蒼天雪竇云什麼處見俱胝老瞎熱則普天普地熱更添怨苦雪竇云莫錯認定盤星也有些子森羅萬象徹下孤危大地山河通上險絕無轉身處什麼處得一指頭禪打云在這裏師云德山第九代圓明禪師有時上堂舉一則語可謂驚羣一日上堂云三千里外且喜勿交涉以拄杖一時趁下諸公看他示眾如金如玉相似此一則公案亦好雪竇見便要穿圓明鼻孔末後句可謂得大自在第六十一則南院諸聖舉僧問南院從上諸聖向什麼處去入地獄去院云不上天堂即入地獄分得一半僧云和尚作麼生好與三十棒院云還知寶應老落處麼放過這漢僧擬議院以拂子驀口打向道當斷不斷反招其亂復喚僧近前云令合是汝行又打一拂子却不瞞人雪竇云令既自行且拂子不知來處莫道不知來處好雪竇道箇瞎且要雪上加霜須然錦上鋪花爭奈靈龜曳尾師云還知寶應老落處麼古人向虎口裏橫身為人第一機裏將金剛王寶劒斬斷了也爭奈不會當時這裏著得一隻眼不妨奇特雪竇云令合是這僧行爭奈拂子在和尚手裏當時喚回打一拂子隨手打云瞎第六十二則雪峰相見舉雪峰示眾望州亭與你相見了也隔烏石嶺與你相見了也隔僧堂前與你相見了也隔保福問鵝湖僧堂前相見且置望州亭烏石嶺什麼處相見也要騐過鵝湖驟步歸方丈保福便入僧堂紅霞穿碧海白日遶須彌雖然如是也是靈龜曳尾何不與麼去雪竇云二老宿是即是只知雪峰放行不知雪峰把定若是雪峰把定雪竇也無出氣處忽有箇衲僧出未審雪竇作麼生竿頭有意豈不是別機宜識休咎底漢爭奈淺水無魚還有望州亭烏石嶺相見底衲僧麼徒勞下鈎良久云擔板禪和如麻似粟持鉢不得詐道不饑師云且道雪峰垂此一鈎佇望多少事却被無出頭所以他只得恁麼道也是喪車背後掉藥袋二人是他屋裏人相見處也不妨奇特雖然如是也是靈龜曳尾或有箇出來問雪竇作麼生不免德山令行一半當時雪峰會中一時偎刀避箭第六十三則國師淨瓶舉僧問忠國師如何是本身盧舍那頂上有圓光的不是忠云與老僧過淨瓶來光現也僧將淨瓶至忠云却安舊處著兩頭三面僧復問如何是本身盧舍那伶俐衲子忠云古佛過去久矣不免打葛藤雲門道無朕跡猶較些子雪竇云直得一手指天一手指地爭得無爭奈拗折拄杖子還會麼雲在嶺頭閑不徹水流㵎下大忙生賴有末後句若無末後句何處有雪竇也師云古人豈是辜負人若咬得破一切處都是如人解射箭不虗發步步俯就為人當時不過淨瓶合作得箇什麼雲門云無朕跡我愛韶陽新定機一生與人抽釘楔雪竇扶忠國師一半直得一手指天一手指地第六十四則茱萸看箭舉趙州訪茱萸兩箇老賊纔上法堂萸云看箭干戈相待州云看箭兩箇無孔鉄鎚萸云過可惜許州云中死雪竇拈云二俱作家蓋是茱萸趙州隨𣯜作什麼二俱不作家箭鋒不相拄索性恁麼判斷直饒齊發齊中也只是箇射垛漢這箇垛子不堪射是中是過僧云是過便打師云趙州老漢行脚到處繞閙纔到雲居居云老老大大何不討箇住處云云及到茱萸如前問云云又舉探水話雪竇拈云只消箇二俱作家末後太慈悲若道知是慈悲不知是毒藥何故聞道看箭是作家一云過一云中是不作家直饒齊發齊中也只是箇射垛漢云云不妨難射引三平見石鞏頌云解擘當胸箭因何只半人為伊途路得所以不全身法燈頌云古有石鞏師架弓箭而坐云云引石鞏問西堂你還捉得虗空麼堂以手撮虗空一下鞏云你不會捉堂云師兄作麼生捉鞏云你近前來堂近前鞏遂扭堂鼻孔云恁麼捉虗空始得第六十五則臨濟赴齋舉臨濟與普化去施主家齋又有兩箇老賊濟云毛吞大海芥納須彌不妨奇特為復是神通妙用為復是法爾如然更參三十年化踢倒飯床手忙脚亂作什麼濟云大麤生猶有這箇在化云這裏是什麼所在說麤說細却好與一掌濟休去可惜許至來日又同赴一施主齋云麤刺只云一般濟復問今日供養何如昨日又恁麼去化又踢倒飯床孟八郎漢濟云大麤生驗人端的處下口便知音化云瞎漢佛法說什麼麤細也須盡情始得濟吐舌放過即不可雪竇拈云兩箇老賊喫飯也未了也須是正賊驗過始得好與三十棒你替他喫棒令雖行且那箇是正賊山僧不是師云引普化搖鈴因緣毛吞巨海云云出維摩經云住不可思議大解脫菩薩為復神通云云化踢倒飯床作麼生會須是大解脫人始得若是粘皮著骨決不奈何臨濟普化佛法爭得如今盛行雪竇道兩箇老賊喫飯也不了且道什麼處是不了處三十棒賞罰分明且道那箇是正賊腦後見腮莫與往來舉三聖瞎驢話大溈秀云古人忍死待來因什麼正法眼藏向這瞎驢邊滅却臨濟行計速速三聖又却怱怱由斯父子情忘遂致後人失望若不得流水還應過別山一僧參臨濟未人事乃問禮拜即是不禮拜即是濟便喝僧禮拜濟云這賊僧亦云這賊便出去濟云莫道無事好首座在後侍立師回問還有過也無座云有濟云賓家有主家有座云二俱有過濟云過在什麼處座便出去濟云莫道無事好南泉云官馬相踏第六十六則三角示眾舉三角示眾云不免打葛藤若論此事眨上眉毛早是蹉過瞎漢麻谷出云蹉過即不問如何是此事無孔鐵鎚角云蹉過也是當機不辨谷便掀倒禪床且道明箇什麼邊事角便打箭鋒相拄猶較些子雪竇拈云兩箇有頭無尾漢眉毛未曾眨上什麼處是眉毛未曾眨上說什麼此事蹉過拈向一邊且道是蹉過不是蹉過有僧問眉毛為什麼不眨上你與他同參雪竇便打自領出去師云南泉云道非物外物外非道趙州出云如何是物外道泉便打云云舉三角示眾云云云一出一入一挨一拶如人把手上高山未免旁觀者哂這裏若爭勝負有得失卒摸𢱢不著要辨不辨底機要會不會底事須是頂門具眼肘後有符始知得此公案非雪竇拈其餘人難為拈掇眉毛未曾眨上正好參究第六十七則巖頭跨門舉巖頭參德山纔跨門便問是凡是聖好箇消息山便喝可惜許巖頭便禮拜也未是好心洞山聞云若不是奯公大難承當旁人具眼爭奈只知其一不知其二巖頭云洞山老漢不識好惡我當時一手擡一手搦也不得放過爭奈已敗闕了也雪竇拈云然則德山門下草偃風行要且不能塞斷人口也有些子當時纔禮拜劈脊便打也是賊過後張弓非唯勦絕洞山亦乃把定豁老而今爭奈闍黎何還會麼李將軍有嘉聲在不得封侯也是閑不免說道理師云德山巖頭初相見便以此問問他云云巖頭禮拜有些子誵訛作麼生會德山休去又舉托鉢話云云又且道這休去如何作麼生是一手擡一手搦處他父子相投時節若至其理自彰且道雪竇要勦絕他作麼生是衲僧門下各有一坐具地縱橫自在所以道我為法王於法自在第六十八則太原顧視舉太原孚上座參雪峰才到法堂顧視雪峰便下看知事好與三萬六千棒雪竇云一千五百人作家宗師被孚老一便高竪降旗也是將錯就錯孚來日入方丈云昨日觸悞和尚第二回重納敗闕峰云知是般事便休可惜放過雪竇云果然遭他雪竇點撿僧問雲門作麼生是觸悞處門便打更不消得雪竇云打得百千萬箇有什麼用處直須盡大地人喫棒方可扶竪雪峰山僧一時悚然且道太原孚具什麼眼猫兒屎孔眼師云世尊拈花迦葉微笑吾有正法眼藏付與摩訶大迦葉蓋為黃河從源頭濁了所以如此且孚上座至看知事若是向上人舉著便知落處太原孚一有底道努眼光古人意不在與麼若無奇特處雪峰肯許他尋常口似懸河作麼生便休去不見道通方作者相共證明又云是賊識賊呈眼光一下似則似猶隔一重在引去堂前峰指日他為什麼却擺手有般人見指日便道光明烜赫雪竇道果然雪峰不打僧問雲門作麼生是觸悞處雲門為什麼却打這僧因風吹火用力不多第六十九則雲門三病舉僧請益雲門玄沙三種病人話門云你禮拜著僧禮拜起門以拄杖便挃合得多少麻滓趜末僧退後門云你不是患盲酌然患盲復喚近前來僧近前門云汝不是患聾酌然患聾乃云還會麼僧云不會門云汝不是患瘂酌然患瘂僧於此有省也須是鑽破混沌始得雪竇便喝云這盲聾瘖瘂漢若不是雲門驢年去因風吹火用力不多如今有底或拈槌竪拂不管教近前又不來只者便是誵訛處還會麼不應諸方還奈何得麼打云有什麼難奈何處若不奈何汝這一隊驢漢又堪作箇什麼也是第二機以拄杖一時打趁放過一著師云地藏云桂琛見有口眼耳和尚作麼生接沙云你去又僧問三種病人話還許學人說道理也無沙云許僧珍重便行舉法眼云我聞先師舉三種病人話我便會如今人只為言語所隔不能會雪竇末後道若不奈何汝這一隊驢漢又堪作箇什麼殊不知雪竇已是盲聾瘖瘂了也第七十則鼓山示眾舉鼓山示眾若論此事如一口劒道什麼時有僧問承和尚有言若論此事如一口劒和尚是死屍學人是死屍斬如何是劒是則是無出身處山云拖出這死屍兼身在內僧應喏歸衣鉢下打疊便行左之右之不妨是姦人細作劒在什麼處山至晚問首座問話僧在否若在朝打三千暮打八百座云當時便去也賴是靈利衲僧山云好與三十棒人人盡道賊過後張弓爭奈現成公案雪竇云諸方老宿總道鼓山失却一隻眼往徃不能坐天下人舌頭殊不知重賞之下必有勇夫且道賞得箇什麼雖然如此若子細點撿將來未免一坑埋却打云已埋了也舉鼓山九重城裏聖箭話云云直下猶難會尋言轉更賒若論佛與祖特地隔天涯須知鼓山不跨石門底句舉示眾云若論此事如一口劒僧問得奇特此喚作弄泥團漢且道死屍在誰邊劒在阿誰邊若這僧有權有實有殺有活也大誵訛鼓山當時合打為什麼不打去了却問首座方打雪竇恁麼拈且得不錯會若有得有失雪竇一時埋却則且置雪竇向什麼處安身立命第七十一則睦州毛端舉睦州問武陵長老了即毛端吞巨海始知大地一微塵作麼生那裏得這一落索來陵云和尚問誰過州云問長老中陵云何不領話兩重三重舊公案州云我不領話汝不領話兩箇都盧鐵面皮雪竇拈云墮也墮也放過即不可復云這箇葛藤老漢好與劃斷拈拄杖云什麼處去也打云也與劃斷了也師云了即毛端吞巨海始知大地一微塵作麼生和尚問誰也不妨奇特作麼生摸𢱢他當時若不是睦州難奈何他云問長老且道畢竟勘得破勘不破武陵畢竟辨得辨不得和尚何不領話州云我不領話汝不領話太煞誵訛如鏡清問僧近離什麼處云石橋云云若人透得這一重千人萬人羅籠不住睦州辨得他一出一入絲來線去一等是打葛藤不妨奇特雪竇拈云墮也墮也只消箇墮也一句何故師子返躑武陵功不浪施末後復云這葛藤老漢好與劃斷拈拄杖云什麼處去鈆刀一割第七十二則仰山坐次舉仰山坐次大禪佛翹一足云西天二十八祖亦如是唐土六祖亦如是天下老和尚亦如是某甲亦如是這弄泥團漢通箇消息不妨奇特只恐有頭無尾山下禪床打四藤條也須是截鐵斬釘始得雪竇云藤條未到打折因什麼只與四下言猶在耳須是斬釘截鐵漢始得打云是幾下大禪佛後到霍山自云集雲峰下四藤條天下大禪佛參少賣弄山云打鐘著須是與他本分草料禪便走三十六計雪竇云這漢雖是見機而變爭奈有頭無尾也是據欵結案師云當時若不見機而變何處有大禪佛闍黎只管喚作什麼或有人問甚處是有頭無尾處什麼是見機而變處你若手忙脚亂老僧在你脚底下舉歸宗下亦有大禪佛云我悟也我悟也師姑元是女人做翹一足云且道是什麼消息若不是脚踏實地爭敢輕開大口拈仰山著力處藤條未到折云云後到霍山至走入來要辨主人家霍山若辨他作家相見須是恁麼去打鐘著且道見箇什麼道理便走蓋伊識得主人家所以便行雪竇道須是斬釘截鐵漢始得這漢見機而變處是有頭無尾處須是自點撿子細始得第七十三則智門般若舉僧問智門如何是般若體硬紏紏地門云蚌含明月通身是眼不破僧云如何是般若用爛泥相似門云兔子懷胎通身是口說不得雪竇云非唯把定世界亦乃安貼家邦是即是德山門下即得若善能參詳便請丹霄獨步作麼生是丹霄獨步師云北塔因緣欲知佛性義當觀時節因緣據古人得箇妙處一言一句為人不妨奇特雲門下尊宿一句是三句北塔既究到這裏後人只管粘皮差骨昔日雲門北斗話并祚和尚般若體話眾中浩浩地商量今時人或聞一句半句不以為事蚌含明月乃中秋月夜蚌含月光以生珠盤山垂語云心月孤圓光含萬象盡十方世界只是般若光光未發時無佛無眾生雪竇云非唯把定世界云云兔子懷胎兔子無雄中秋月夜吞月光而孕從口產子答得安貼家邦舉體露金風鉢裏飯桶裏水銀椀裏盛雪珊瑚枝枝撑著月宗師眼目須至如此復舉玄沙示眾云十方世界不漏一絲毫第七十四則烏臼參堂舉烏臼問玄紹二上座近離什處一口吞盡僧云江西不妨好箇消息臼便打是則是太麤生僧云久聞和尚有此機要賴是知落處臼云汝既不會第二箇近前來還容得人擬議也無僧擬議果然恁麼去臼亦打作家宗師就中難得云同坑無異土參堂去雪竇云宗師眼目須至恁麼自達磨西來唐土討一箇也難得如金翅擘海直取龍吞能取譬喻有般漢眼目未辨東西拄杖不知顛倒故是杜撰長老只管說照用同時人境俱奪便作座主見解師云烏臼乃馬祖下名望尊宿玄紹二公亦是通方作者錄中有問答因緣云云復舉公案便打過在什麼處須是情盡見除無依倚方見他古人全機處玄紹二上座也識破也便云久聞和尚有此機要作麼生是他機要處參堂去有什麼共語處直須是情盡此是本分草料難為咬嚼他通方作者方知落處汝既不會第二箇近前來僧擬議云云參堂去若作無語會是錯此公案是從上提綱者格則雪竇云如金翅鳥擘海直取龍吞有一般漢云云雪竇破人情見有云拈棒便打處是照用同時人境俱奪錯會了也第七十五則雪峰天使舉雪峰問僧見說大德曾為天使來是否和尚得恁麼耳目長僧云不敢只管喫棒峰云爭解恁麼來果然拈起拄杖子僧云仰慕道德豈憚關山已是放過了也峰云汝猶醉在出去放行此令僧便出果然峰乃召大德僧回首峰云是什麼且道是什麼僧亦云是什麼箭鋒相拄峰云這漆桶天下衲僧跳不出僧無語可惜許峰却顧謂鏡清云好箇師僧向漆桶裏折倒殺人不眨眼漢更賣弄好手清云和尚豈不是據欵結案撞着箇作家峰云也是我尋常用底忽若喚回道是什麼被他道這漆桶又作麼生奪却雪峰槍頭子清云成何道理扶強不扶弱峰云我恁麼及伊汝又道據欵結案他恁麼及我汝又道成何道理一等是恁麼時節其間何故有得有不得雪峰拄杖子被鏡清奪了清云不見道醍醐上味為世所珍遇此等人翻成毒藥智過於師方堪傳授雪竇云看他父子相投言氣相合知者謂粉骨碎身此恩難報酌然不知者謂扶高抑下臨危悚人大有人恁麼會毒藥醍醐千載龜鑑何止千載盡未來際風行草偃還會麼這漆桶咄便打還我話頭來師云這僧作貴官來捨緣出家行脚峰云汝猶醉在尋常雪峰為人如金翅擘海直取龍吞故云盡大地撮來如米粒大豈不是如金翅擘海直取龍吞雪峰恁麼道且道這僧什麼處是構雪峰處復舉二僧到雪峰托庵門話彼中末後無語却毒這裏末後有語却傷鋒犯手是時鏡清作侍者辨得他賓主相見處雪峰拈問鏡清一開一遮一收一放峰折倒他不下豈不見道雖是死蛇解弄也活清云成何道理何故雪峰道即有分者僧道即無分峰云我恁麼及伊又道據欵結案他什麼及我又道成何道理一等是恁麼時節其間何故有得有不得鏡清便與念呪一遍醍醐上味為世所珍遇此等人翻成毒藥云云千聖傳來不墮諸數直須獨脫一切處羅籠不得若謂得去天下衲僧被你一時穿却鼻孔又趙州道拈一莖草作丈六金身用將丈六金身作一莖草用又雪竇云看他父子相投言氣相合知者謂粉骨碎身此恩難報不知者謂扶高抑下臨危悚人出去這漆桶何處是抑下悚人舉龜鑑事末後撮作一束教人易會第七十六則大隨普賢舉僧辭大隨隨問什麼處去不可不知去處僧云峨眉禮普賢去峩眉去即便休禮拜普賢作什麼隨竪起拂子云文殊普賢總在這裏事生也僧畫一圓相拋向背後元來是屋裏人隨喚侍者將一貼茶與這僧鈍滯殺人雲門別云西天斬頭截臂這裏自領出去幽州猶自可最苦是新羅雪竇云殺人刀活人劒具眼者辨取也是衲僧茶飯師云大隨參六十餘員善知識在福州安禪師會下作板頭二十年云云大隨竪起拂子僧畫一圓相這僧是溈仰下禪客畫圓相拋向背後且道是奇特不是奇特大隨喚侍者將一貼茶與他是賞是罰是肯他是不肯他雲門別云西天斬頭截臂這裏自領出去舉外道論義負墮即斬若會雲門意識得大隨雪竇第七十七則雲門新羅舉雲門問新羅僧汝是什處人既知更問作什麼僧云新羅人實頭人難得門云將什麼過海是他始得僧云草賊大敗猶較些子門云為什麼在我手裏第二杓來也僧云恰是也較些子門云一任𨁝跳可惜許雪竇云雲門老漢龍頭蛇尾放過這僧為什麼在我手裏也是停囚長智恰是劈脊便打打云也不移一時師云且道打他作麼若道是過眉鬚墮落這箇驗人這僧也是作家將什麼過海落在第二頭第七十八則北禪資福舉北禪問僧近離什處與前一般僧云黃州不可不實頭禪云夏在什麼處更饒一路僧云資福有事相借問禪云福將何資入草也僧云兩重公案也不得放過禪云爭奈在我手裏却似雲門弟子相似僧云在手裏即收取與新羅僧同參禪便打作家宗師天然有在這僧不甘隨後趁出盡令而行始是本分雪竇云奇怪宛有超師之作也不消得據欵結案還知這僧麼只解貪前不能顧後直饒解顧前後打了也是趁出若在雪竇手裏棒折也未放在打云未折在師云北禪是雲門弟子福將何資大凡勘辨須是趯翻方勘得爭奈在我手裏所以道生擒活捉第七十九則睦州示眾舉睦州示眾云我見百丈不識好惡也有些子大眾方集以拄杖一時打下正令當行復召大眾眾回首龍頭蛇尾丈云是什麼有什麼共語處是則是忒煞不近人情黃蘗和尚大眾方集以拄杖一時打下也是正令當行復召大眾眾回首兩重公案蘗云月似彎弓少雨多風猶較些子摸𢱢不着雪竇云說什麼猶較些子直是未在也是山僧曾道來若據雪竇眾集一時打下便休有什麼綣繢有什麼誵訛或有箇無孔鐵鎚為眾竭力也未是闍黎分上事善能擔荷只恐承當不得可以籠古今乾坤把斷朝打三千暮打八百雪竇驀拈拄杖云險放過一著龍頭蛇尾作什麼師云睦州嗣黃蘗雲巖在百丈二十年為侍者後嗣藥山到藥山山問百丈有何言句舉前話至是什麼有什麼共語處山云有此奇特事睦州會拈先去頭邊道云我見百丈不識好惡大眾方集以拄杖一時打下復召大眾眾回首丈云是什麼又拈猶較些子睦州意作麼生這些子全機提來硬糾糾地雪竇善擔荷驀拈拄杖云放過一著且道雪竇前頭為人後頭為人無事試定當看第八十則玄沙圓相舉玄沙見鼓山來作一圓相是即是太煞起模畫樣生山云人人出這箇不得撞見作家也須分明舉似沙云情知汝向驢胎馬腹中作活計此猶是天下人摸𢱢不着處山云和尚又作麼生渾無丈夫氣息沙云人人出這箇不得被他奪却槍頭了也山云和尚恁麼道得某甲恁麼道為什麼不得只管喫棒沙云我得汝不得識什麼好惡雪竇拈云只解貪觀白浪不知失却手橈只如雪竇又作麼生打云人人出這箇不得師云備頭陀作一圓相直須子細參究直是奇特只恐你錯會情知汝向驢胎馬腹裏作活計若透得過方知玄沙重重慈悲粉骨碎身此恩難報舉玄沙不見一法為大過患云云相似我得汝不得赤心片片舉外道問佛說不定法公案正是這箇樣子直是絕情塵意想不拘是非得失打得脫落洒洒地然後可以與此相合無悞第八十一則南泉賣身舉南泉示眾云王老師賣身去也還有人買麼奇怪一僧出眾云某甲買釣得一箇泉云不作貴不作賤作麼生買太煞誵訛僧無語可惜許臥龍代云和尚屬某甲收禾山代云是何道理不得翻欵趙州云明年與和尚作一領布衫此語最毒雪竇云雖然作家競買要且不解輸機且道南泉還肯麼直饒肯也是堦下漢雪竇也擬酬箇價直令南泉進且無門退亦無地少賣弄不作貴不作賤作麼生買看雪竇有什麼伎倆別處容和尚不得將為多少奇特師云著槽廠去客作擔板漢臥龍道和尚屬某甲禾山云世間無比趙州驟步濶脚拳踢手搦難為摸𢱢機輪轉處作者猶迷所以古人道向上提綱非情塵所測雪竇道別處容和尚不得輸機慶藏主猶自貶剝他第八十二則茱萸一橛舉茱萸把一橛竹上堂兩箇三箇成羣作隊作什麼還有虗空裏釘得橛麼這老漢熱發作什麼時有靈虗上座出云虗空是橛已是隨語生解了也萸便打好打靈云莫錯打某甲猶自口喃喃萸便休去可惜許雪竇云若要此話大行直須打了赶出堪作什麼且道意在什麼處師云舉香嚴上樹話舉溈山有句無句話古人踏著上頭關棙子不慚為人通箇消息是奇特處靈云虗空是橛雖然為眾竭力爭奈禍出私門莫錯打某甲臨危不變始驚羣胡釘鉸見趙州只這縫尚不奈何是這般底正好打若明此意千千萬萬人羅籠不住第八十三則夾山生死舉夾山與定山同行語話次定山云生死中無佛則無生死只得一邊夾山云生死中有佛則不迷生死也只得一邊互相不肯同上大梅相見了具說前事這漢自家金剛王寶劒在什麼處夾山問云未審那箇親那箇疎梅云一親一疎作家宗師夾山云那箇親猶自不惺惺梅云且去明日來兩重三重夾山來日又問云云梅云親者不問問者不親直得雨淋頭夾山後住院云我當時在大梅失却一隻眼貧兒思舊債雪竇云夾山畢竟不知換得一隻眼也須是八面受敵不妨玲瓏大梅老漢當時聞舉若以棒一時打出且道打他作什麼豈止劃斷兩人葛藤亦乃為天下宗匠已在言前不勞重舉師云且道大梅打他作麼生二人同論生死為大事研窮要到極則處不見永嘉道不是山僧逞人我修行恐落斷常坑夾山明日又上來問有多少誵訛梅云親者不問問者不親似馬前相撲却推在夾山身上辨龍虵兮眼何正擒虎兕兮機不全第八十四則保福羚羊舉僧問保福雪峰平生有何言句得似羚羊掛角時險福云我不可作雪峰弟子不得三千里外望風啟告雪竇云一千五百箇布衲保福較些子隨邪逐惡作麼直下未夢見在師云明眼漢沒窠臼不將實法繫綴人家男女直得似羚羊掛角相似方為得人無聲色無蹤跡亦摸𢱢不著我不可作雪峰弟子不得有咬猪狗底手脚明剝剝地所以雪竇恁麼拈第八十五則巴陵祖意舉僧問巴陵祖意教意是同是別同則總同別則總別陵云鷄寒上樹鴨寒下水也是說道理僧問睦州祖意教意是同是別不同不別州云青山自青山白雲自白雲也是說道理雪竇云問既一般答亦相似爭奈水乳不分其中有利他自利瞞人自瞞自利利他即得瞞人自瞞未得若點撿分明管取解空第一已點撿了也還有解空底麼師云舉座主問白馬夾山事此箇公案須是具眼底人方解見透巴陵睦州宗既不同為什麼答處皆顯英靈衲子試請辨看第八十六則趙州答話舉趙州示眾云今夜答話去也有解問者出來慣開飯店子不怕大肚漢時有僧出作禮也是作家州云比來拋塼引玉引得箇墼子若不得這老漢爭辨得他真偽法眼舉問覺鐵觜先師意作麼生這老漢出世也為人眼在什麼處覺云如國家拜將乃問甚人去得打葛藤去也時有人出云某甲去得與這僧同參云汝去不得趙州再生法眼云我會也你道真箇會只是詐明頭知雪竇云靈利漢聞舉便落處兩箇俱詐明頭雖然如此放過覺鐵觜若不放過向他道什麼大宗師語不虗發出來必是作家因什麼拋塼引墼若是雪竇拋塼引得箇什麼諸禪德要識趙州麼看雪竇分踈不下從前汗馬無人見只要重論蓋代功爭奈杓柄在他手裏師云德山小參不答話與趙州小參答話是同是別又法眼問覺鐵觜云云又法眼是會來故問要驗覺鐵觜舉庭前栢樹子話有者錯會無庭前栢樹子話舉喻是什麼人去得云某甲去得云汝去不得更隔不得若稍遲鈍即不是法眼云我會也飲氣吞聲因什麼引得箇墼子雪竇弄險末後忒煞老婆心切從前汗馬無人見只要重論蓋代功第八十七則躭源辭師舉躭源辭國師歸省覲馬祖於地上作一圓相展坐具禮拜已喫三十棒了也祖云子欲作佛去是何心行源云某甲不解揑目賓主俱失祖云吾不如汝前箭猶輕後箭深雪竇云然猛虎不食其子爭奈來言不豐若不是雪竇也辨他不出諸人要識躭源麼只是箇藏身露影漢朝打三千暮打八百未為分外師云這漢禮拜了便休更畫圓相作什麼有云建立且喜勿交涉吾不如汝此語最毒寧可喫劒某甲不解揑目是來言不豐第八十八則溈仰田中舉溈山問仰山什處來箭鋒洎險不可拄仰云田中來有話在溈云田中多少人不問爭知仰插鍬子叉手而立撞壁磕墻好劈耳掌溈云南山大有人刈茅左轉右轉仰拈鍬子便行雖然見機而變已與三十棒了也玄沙云我當時若見便與踏倒鍬子已是第二頭鏡清云不奈船何打破戽斗果然僧問明招古人意在插鍬處叉手處大有人恁麼卜度招喚某甲瞌睡漢僧應喏寐語作麼招云還曾夢見仰山麼三生六十劫也未夢見在雪竇云諸方老宿咸謂插鍬話奇特也大似隨邪逐惡若據雪竇見處仰山被溈山一問直得無繩自縛去死十分也分踈不下還有跳得出底麼也不消踏倒鍬子便行師云仰山插鍬叉手溈山當時好與劈胸一踏養子之緣只道得箇南山大有人刈茆玄沙道我當時若見便與踏倒鍬子鏡清道不奈船何打破戽斗舉德山四家錄清八路事會八面受敵明招云還曾夢見仰山麼這箇為之向上轉若論戰也箇箇立在轉處亦不走向兩頭亦不坐斷兩頭道得有出身處又明得出古人意活鱍鱍地如虎戴角相似雪竇一時拈却了也仰山被溈山云云還有救得仰山底麼打云過第八十九則雪峰覆船舉雪峰問僧近離什麼處僧云覆船可惜許峰云生死海未渡為什麼覆船這老漢持聾作瘂作什麼雪竇代云久響雪峰待者老漢擬議拂袖便打好與三十棒其僧當時無語歸舉似覆船船云何不道渠無生死打葛藤僧再至雪峰舉此語傳言送語漢峰云此不是你語騐破了也一場懡㦬僧云是覆船恁麼道果然峰云我有二十棒寄與覆船二十棒老僧自喫不干闍黎事閻羅王不吞鐵丸諸鬼不怕從自己胷襟流出不妨奇特雪竇云能區能別能殺能活若也辨得天下橫行閙市裏有一箇半箇還辨得麼師云藥山化主到甘贄行者云云灌溪到末山云云古人持聾作瘂驗人雪竇云久響雪峰云云有雙關意有擒雪峰底鉗鎚又有出覆船底活路雪峰作麼生便知是覆船語我有二十棒云云二十棒自喫為人底宗匠不惜眉毛能區能別能殺能活第九十則保福扶犁舉保福問長慶盤山道光境俱亡復是何物面前背後洞山云光境未亡復是何物面前背後據二老宿總未得勦絕二老宿且置闍黎又作麼生得勦絕作麼生道得勦絕去畢竟由阿誰慶良久蒼天蒼天福云情知汝向鬼窟裏作活計這些子天下衲僧若知便請丹霄獨步慶云你作麼生理長即就福云兩手扶犁水過膝當時也好與一拶雪竇云俱亡未亡總由我保福因什麼道未得勦絕酌然能有幾箇拄杖在什麼處諸人又作麼生道免得長慶在鬼窟裏用免作什麼柳絮隨風自西自東泥裏洗土塊尖上更加尖師云盤山垂語云云釋迦老子常光一尋諸人有多少福云情知你向鬼窟裏作活計這些子不妨難會兩手扶犁水過膝長慶當時也好向他道也是鬼窟裏作活計若參得出親見保福雪竇拈云酌然能有幾箇這裏有箇好處末後著箇理論柳絮隨風自西自東你且道是為諸人拈且道是明長慶且道是明保福且道是明盤山且道是明洞山若知得落處放行也由你把定也由你第九十一則大梅鼯鼠舉大梅聞鼯鼠鳥聲謂眾云即此物非他物自領出去汝善護持吾當逝矣自帶累猶可累他作什麼雪竇云這漢生前莾鹵死後顢頇也有些子即此物非他物是何物打破漆桶與你相見還有分付處也無了有般漢不解截斷大梅脚跟只管道貪程太速正在萬里崖州師云大梅初參大寂問如何是佛大寂云即心是佛師即大悟唐貞元中居於天台山餘姚南七十里梅子真舊隱時鹽官會下一僧入山採拄杖迷路至庵所問曰和尚在此山多少時也師曰只見四山青又黃師忽一日上堂云來莫可抑去莫可追從容間復聞鼯鼠鳥聲師云即此物非他物汝善護持吾當逝矣言訖示滅智覺禪師延壽讚曰師初得道即心即佛最後示徒物非他物窮萬法源徹千聖骨真化不移何方出沒鼯鼠乃生死鳥也什麼處是莾鹵處是何物雪竇與你提開第九十二則趙州般若舉趙州問大慈般若以何為體道什麼慈云般若以何為體蹉過也不知州呵呵大笑天下衲僧跳不出至來日州掃地次大慈却問般若以何為體穿過了也州放下掃呵呵大笑天下衲僧跳不出雪竇云前來也笑後來也笑笑中有刀殺得人活得人大慈還識麼莫管大慈只諸人識麼直饒識得未免喪身失命闍黎性命在什麼處師云杭州大慈和尚嗣馬祖一日趙州問般若以何為體慈云般若以何為體趙州笑大慈不是好心至來日大慈要拔本問趙州般若以何為體州放下掃笑用攙旗奪鼓手脚用得滑頭第九十三則德山托鉢舉德山一日飯遲自掌鉢至法堂前雪峰見云這老漢鐘未鳴鼓未響托鉢向什麼處去只知事逐眼前過不覺老從頭上來山便回且道是什麼心行峰舉似巖頭是箇漢始得頭云大小德山不會末後句一箇太慈悲一箇太落草山聞令侍者喚巖頭至方丈問你不肯老僧那也是這兩箇老賊始得巖頭密啟其意你且道當時說什麼山至來日上堂與尋常不同王三許與李八商量巖頭到僧堂前撫掌笑云且喜老漢會末後句他後天下人不奈何也是火裏人作伴雖然如是只得三年靈山授記未到如此明招代德山云咄咄沒處去沒處去只見錐頭利不見鑿頭方雪竇云曾聞說箇獨眼龍元來只具一隻眼過在什麼處殊不知德山是箇無齒大蟲若不是巖頭識破爭得明日與昨日不同雪竇眼更親諸人要識末後句麼雪竇錯下名言只許老胡知不許老胡會頭出頭沒還我金剛王寶劒來師云張無盡頌鼓寂鐘停托鉢回巖頭一拶語如雷果然只得三年活莫是遭他授記來德山無語最毒舉奯上座來參問或若心境一如底人來時如何云云舉三聖參云不用展炊巾云云設有云云休去舉公案了巖頭云大小德山下云云當時若作雪峰向他道什麼免得巖頭此語且道是德山會不會巖頭密啟其意此語好參明招恁麼道要免巖頭話又却遭雪竇點撿雪竇道明招則具一隻眼也明在何故不合平地上起骨堆什麼處是只具一隻眼處什麼處是巖頭識破處有底只管去今日明日處作活計諸人要會末後句麼只許老胡知不許老胡會也是靈龜曳尾第九十四則雪峰古鏡舉雪峰一日見獼猴乃云這獼猴各各佩一面古鏡這老漢平地上起骨堆作什麼三聖便問歷劫無名何以彰為古鏡已落他綣繢了也峰云瑕生也是兩箇草裏漢聖云一千五百人善知識話頭也不識猶較些子峰云老僧住持事繁又恁麼去雪竇云好與三十棒過在什麼處這棒放過也好元來識進退免得將錯就錯也是將錯就錯了也師云古鏡濶一丈云云人人有一面古鏡聖云歷劫無名何以彰為古鏡入理深談峰云瑕生也雪峰為人在什麼處看他三聖作家云一千五百人善知識話頭也不識他頂門具眼用本分作略大丈夫漢須至恁麼不入虎穴爭奈虎子雪竇拈出來要人共知云好與三十棒又云放過也好且道是什麼道理第九十五則洞山衣鉢舉僧問洞山時時勤拂拭莫使惹塵埃為什麼不得他衣鉢鈍滯祖師山云直饒道本來無一物也未合得他衣鉢自救即得且道什麼人合得他不曾作這般去就僧下九十六轉語皆不相契力盡神疲末後云設使將來他亦不要且道他具箇什麼眼洞山深肯好與三十棒雪竇云他既不受是眼將來底必應是瞎酌然是瞎還見祖師衣鉢麼用祖師衣鉢作什麼若於此入門便乃兩手分付用入門作什麼非但大庾嶺頭一箇提不起設使闔國人來且欵欵地將去只如闍黎還見祖師衣鉢麼師云五祖當時也是將錯就錯權且分付等他道本來無一物好劈脊便打作麼生合得他衣鉢雪竇向頭上道他既不受是眼將來底必應是瞎設使將來他亦不要皆下語云云善取不如惡取今時人越道奇特語展轉不是云云雪竇云將來底必應是瞎山僧道真箇瞎意作麼生若向這裏得脫去相次得他衣鉢也第九十六則投子三星舉僧問投子依俙似半月髣髴若三星也是鹽鐵判官乾坤收不得師於何處明自屎不覺臭子云道什麼可惜許僧云想師只有湛水之波且無滔天之浪招得他什麼道子云閑言語洎合放過雪竇云投子古佛不可道不知酌然若點撿將來直是天地懸隔只為他不用本分草料纔問和聲便打也是第二頭師云橫鋪三點應天上之星辰偃臥一鈎表海中之明月舉僧問龍牙如何是本來心牙云道者老僧二十年也無舉僧問大覺龍牙道老僧二十年也無意旨如何覺云罷拈三尺劒休弄一張弓仁宗皇帝問大覺有節非干竹三星遶月宮一人居日下弗與眾人同詔陽云大哉大哉投子云閑言語這語勝如行棒雪竇云投子是古佛須知有行棒底正令為什麼却道直是天地懸隔宗師眼目要處辨箇緇素事須得恁麼第九十七則洛浦伏膺舉洛浦久為臨濟侍者到夾山問自遠趨風乞師一接已入他烟熖裏了也山云目前無闍黎此間無老僧抓鈎搭𢱢浦便喝猶較些子山云住住闍黎且莫草草怱怱雲月是同溪山各異閃眼便着截斷天下人舌頭即不無爭教無舌人解語那裏得這一落索來浦無對可惜龍頭蛇尾山便打打得不濟事雪竇云這漢可悲可痛鈍滯他臨濟也有些子他既雲月是同我亦溪山各異爭奈賊過後張弓說什麼無舌人不解語坐具劈口便摵雪竇為旁人按劒夾山若是箇知方漢必然明窓下安排總若便截却舌頭又作麼生師云洛浦是趙州鑾城人初參臨濟濟問近離甚處云鑾城濟云有事相借問得否云元安不會濟云打破大唐國裏覔箇不會底人難得興化為侍者乃云和尚恁麼勘僧如將彈弓就地上彈死兒有什麼用處濟云你又作麼生化云何不道老僧罪過後浦為侍者濟勘一座主有一人於三乘十二分教明得有一人於三乘十二分教明不得且道是同是別主云明得即同明不得即別浦云這裏是什麼所在說同說別濟休去座主去後濟回却問適來是你什麼祗對浦便喝濟便打云云傳明初承嗣石樓住京口舉公案爭奈無舌人能解語興化聞云但知作佛愁什麼眾生有云臨濟為他致見洛浦如此殊不知神方秘訣父子不傳自是洛浦承當處莾鹵雪竇忍俊不禁為他臨濟雪屈第九十八則香嚴仙陀舉僧問香嚴如何是王索仙陀婆山僧不曾要人點茶嚴云過這邊來未解應在雪竇云鈍滯殺人也有些子僧又問趙州王索仙陀婆時如何應喏州乃曲躬叉手也是兩重公案雪竇云索鹽奉馬從古判到如今師云此語在敲磕轉處些子如何是王索仙陀婆且道在賓家處在主家處若辨得出方具參學眼第九十九則風穴離微舉僧問風穴語默涉離微如何通不犯斬穴云長憶江南三月裏鷓鴣啼處百花鮮隔曾有僧問雪竇雪竇對他道劈腹剜心又且如何着復云因風吹火別是一家少賣弄傷鼈恕龜必應有主須還古人始得師云寶藏論語默涉離微路逢達道人不將語默對意雖一般言有巧拙語默涉離微穴云長憶江南三月裏鷓鴣啼處百花鮮且道是答他不答他若道是答他話有什麼交涉若道信口答他去又作麼生得應機去但於事上覔莫向句中求雪竇云劈腹剜心又且如何與趯倒茶爐話同復拈因風吹火別是一家風穴答話他隨後答一轉語傷鼈恕龜必應有主臨濟下有四賓主句全主到來放行却答他有全主即放行第百則古德沙水舉古云眼裏著沙不得耳裏著水不得打淨潔毬子忽若有箇漢信得及把得住不受人瞞雖然不是本色衲子放過一着只恐不恁麼佛祖言教是什麼熱椀鳴聲却有箇奇特處便請高掛鉢囊拗折拄杖也是做得去始得管取一員無事道人是則是猶有這箇在又云眼裏著得須彌山耳裏著得大海水却是箇作家漢一般受人商量和光順物有什麼難佛祖言教如龍得水似虎靠山謾得你千箇萬箇却須挑起鉢囊橫擔拄杖走殺闍黎亦是一員無事道人脚跟下已與三十棒了也復云恁麼也不得不恁麼也不得雪竇方始尋得屋裏路然後沒交涉自知較一半三員無事道人中要選一人為師一時赶向無生國裏闍黎也不要打師云說禪說道是什麼熱椀鳴聲若恁麼說話無事禪底却有出氣處畢竟是那箇不堪為師打疊前後教成一片方見雪竇拈古你若隨這三箇不唧𠺕漢賺殺一生人去却作麼生汝等諸人各各討一條活路始得
