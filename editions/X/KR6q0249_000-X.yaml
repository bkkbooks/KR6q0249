body:
  text: 重刻圓悟禪師擊節錄題辭圓悟禪師電機波辨色絲妙絕可謂文武火爐鍛練學人矣惜乎集錄者採擷微言而失之簡加之三豕門五覩者眼眩焉頃予友淳公蒐獵竺典企予祖躅以彌縫於闕蓋藻鏡當臺妍媿可逃乎哉晨星落落秦無人也冀邈乎霧海早刮目于南針元文戊午秋九月糓旦常州沙門說驢年序明覺禪師瀑泉集見存乎大藏中大古希音和者鮮矣圓悟禪師擊節乎其間教人不覺手舞足蹈可惜此土之舊刊不啻失諸刀刁魯魚提綱謬混著語兩則合作一則況乎舉類多其所錄者踈也是以讀者如箝豈匪一大欠事哉黑非佛果耳孫謬涉字海獵禪林而獲于其魚兔蓋彼此交奏稍識正音歟且如類則事蹟別出一卷未慊于懷綆短不搆深泉曲遠難盡其響罪過彌天一任諸方貶剝關西黑太淳閣筆於東武吉祥之草廬云是錄撰次不吻合于拈古者盖所聞紛紜未經考訂卒錄之故歟今輙仍舊耳先賢未游刃乎此書故勾棘難曉也今有古德之頌者掇標之上方未覩善本蹉漏落偕諸同袍癡人說夢不則遺臭千載勿吝驚䇿則幸佛果擊節目錄卷上德山示眾一雪峯普請二百丈拂子三崇壽指凳四永嘉遶錫五仰山指雪六香嚴垂語七魯祖喫飯八雪峰古㵎九西堂爛却十欽山竪拳十一睦州苕菷十二棗樹漢國十三趙州偷筍十四保壽開堂十五無業妄想十六德山作麼十七保福簽瓜十八南泉示眾十九馬祖圖相二十興化罰錢二一長慶淘金二二大梅無意二三臨濟蒿枝二四師祖珠藏二五鏡清問僧二六雲門法身二七三聖金鱗二八伏牛馳書二九玄沙過患三十報慈問僧三一船子絲綸三二投子一言三三祖師六塵三四本生拄杖三五安國伊蘭三六玄沙見虎三七卷下洞山三頓三八大慈示眾三九黃蘗閉門四十鏡清方便四一香林衲衣四二本仁示眾四三國師三喚四四投子抑逼四五雲門示眾四六智門草鞋四七雪峰五棒四八徑山一點四九睦州檐板五十巴陵示眾五一則川摘茶五二雲門裂破五三睦州鉢囊五四雪峰三下五五南泉出世五六欽山恁麼五七玄沙問僧五八長慶羚羊五九圓明示眾六十南院諸聖六一雪峰相見六二國師淨瓶六三茱萸看箭六四臨濟赴齋六五三角示眾六六巖頭跨門六七太原顧視六八雲門三病六九鼓山示眾七十睦州毛端七一仰山坐次七二智門般若七三烏臼參堂七四雪峰天使七五大隨普賢七六雲門新羅七七北禪資福七八睦州示眾七九玄沙圓相八十南泉賣身八一茱萸一橛八二夾山生死八三保福羚羊八四巴陵祖意八五趙州答話八六躭源辭師八七溈仰田中八八雪峰覆船八九保福扶犁九十大梅鼯鼠九一趙州般若九二德山托鉢九三雪峰古鏡九四洞山衣鉢九五投子三星九六洛浦伏膺九七香嚴仙陀九八風穴離微九九古德沙水一百目錄畢
